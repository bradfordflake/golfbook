// ---- storage shim: mirrors the Claude-artifact window.storage API, backed by localStorage ----
window.storage = {
  async get(key) {
    try {
      const v = localStorage.getItem('dfl:' + key);
      if (v == null) return null;
      return { key, value: v };
    } catch (e) { return null; }
  },
  async set(key, value) {
    try { localStorage.setItem('dfl:' + key, value); } catch (e) {}
    return { key, value };
  },
  async delete(key) {
    try { localStorage.removeItem('dfl:' + key); } catch (e) {}
    return { key, deleted: true };
  },
};

// ---------- helpers ----------
function uid() {
  return Math.random().toString(36).slice(2, 9);
}
function roundHalfDown(x) {
  return Math.ceil(x - 0.5);
}
function quotaFromIndex(quotaBase, handicap) {
  return roundHalfDown(quotaBase - handicap);
}
function courseParTotal(course, n) {
  return course.holes.slice(0, n).reduce((s, h) => s + h.par, 0);
}
function stablefordPoints(strokes, par) {
  const d = strokes - par;
  if (d >= 2) return 0;
  if (d === 1) return 1;
  if (d === 0) return 2;
  if (d === -1) return 3;
  if (d === -2) return 4;
  return 5;
}
function scoreColor(strokes, par) {
  if (strokes == null) return C.faint;
  const d = strokes - par;
  if (d <= -2) return C.gold;
  if (d === -1) return C.lime;
  if (d === 0) return C.text;
  if (d === 1) return C.orange;
  return C.red;
}
function roundHoles(round, course) {
  return round.holes === 9 ? course.holes.slice(0, 9) : course.holes;
}
function localRanks(holes) {
  const withIdx = holes.map((h, i) => ({ i, si: h.si }));
  const sorted = [...withIdx].sort((a, b) => a.si - b.si);
  const rank = new Array(holes.length);
  sorted.forEach((h, r) => (rank[h.i] = r + 1));
  return rank;
}
function strokesOnHole(strokesReceived, rank, holesCount) {
  if (!strokesReceived || strokesReceived <= 0) return 0;
  const base = Math.floor(strokesReceived / holesCount);
  const extra = strokesReceived % holesCount;
  return base + (rank <= extra ? 1 : 0);
}
function getTee(course, teeName) {
  return course.tees.find((t) => t.name === teeName) || course.tees[0];
}
function playerQuotaInRound(settings, round, player, course) {
  const pd = round.playerData[player.id];
  if (pd && pd.quotaOverride != null) return pd.quotaOverride;
  const tee = getTee(course, round.teeName);
  const fullPar = courseParTotal(course, 18);
  const ch18 = Math.round((player.handicap * tee.slope) / 113 + (tee.rating - fullPar));
  if (round.holes === 18) return roundHalfDown(settings.quotaBase - ch18);
  const ch9 = roundHalfDown(ch18 / 2);
  const qBase9 = roundHalfDown(settings.quotaBase / 2);
  return roundHalfDown(qBase9 - ch9);
}
function roundPlayerList(round, players) {
  if (Array.isArray(round.playerIds)) return players.filter((p) => round.playerIds.includes(p.id));
  return players; // backward compat: rounds created before player-selection existed show everyone
}
function roundGameLabel(round) {
  const game = GAME_LIBRARY.find((g) => g.id === round.gameId) || null;
  if (game) return game.name;
  return round.casual ? 'Casual Round' : 'Dogfight League';
}
function roundNamesLabel(roundPlayers) {
  const firsts = roundPlayers.map((p) => (p.name || '').trim().split(/\s+/)[0] || p.name);
  if (firsts.length === 0) return 'No players selected';
  if (firsts.length <= 4) return firsts.join(', ');
  return firsts.slice(0, 3).join(', ') + ` +${firsts.length - 3} more`;
}
function formatRoundDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function courseHandicapFor(round, player, course) {
  const tee = getTee(course, round.teeName);
  const fullPar = courseParTotal(course, 18);
  const ch18 = Math.round((player.handicap * tee.slope) / 113 + (tee.rating - fullPar));
  return round.holes === 9 ? roundHalfDown(ch18 / 2) : ch18;
}
function strokesThisHole(round, player, course, holeIdx) {
  const holes = roundHoles(round, course);
  const ch = Math.max(0, courseHandicapFor(round, player, course));
  const ranks = localRanks(holes);
  return strokesOnHole(ch, ranks[holeIdx], holes.length);
}
function playerPointsInRound(round, player, course) {
  if (Array.isArray(round.playerIds) && !round.playerIds.includes(player.id)) return null;
  const pd = round.playerData[player.id];
  if (!pd) return null;
  if (round.entryMode === 'points') return pd.points != null ? pd.points : null;
  const holes = roundHoles(round, course);
  const net = round.pointsBasis === 'net';
  const ranks = net ? localRanks(holes) : null;
  const ch = net ? Math.max(0, courseHandicapFor(round, player, course)) : 0;
  let total = 0,
    count = 0;
  holes.forEach((h, i) => {
    const s = pd.holeScores ? pd.holeScores[i] : null;
    if (s != null) {
      const eff = net ? s - strokesOnHole(ch, ranks[i], holes.length) : s;
      total += stablefordPoints(eff, h.par);
      count++;
    }
  });
  return count > 0 ? total : null;
}
function playerResultInRound(settings, round, player, course) {
  const pts = playerPointsInRound(round, player, course);
  if (pts == null) return null;
  const quota = playerQuotaInRound(settings, round, player, course);
  return { points: pts, quota, result: pts - quota };
}
function getEvents(rounds) {
  const seen = new Set();
  const events = [];
  rounds.forEach((r) => {
    if (seen.has(r.id)) return;
    const partner = r.combinedWith ? rounds.find((x) => x.id === r.combinedWith) : null;
    if (partner) {
      events.push({ id: r.id, roundIds: [r.id, partner.id], date: r.date });
      seen.add(r.id);
      seen.add(partner.id);
    } else {
      events.push({ id: r.id, roundIds: [r.id], date: r.date });
      seen.add(r.id);
    }
  });
  return events;
}
function eventResultForPlayer(settings, event, rounds, courses, player) {
  let pts = 0,
    quota = 0,
    any = false;
  event.roundIds.forEach((rid) => {
    const r = rounds.find((x) => x.id === rid);
    if (!r) return;
    const course = courses.find((c) => c.id === r.courseId);
    if (!course) return;
    const res = playerResultInRound(settings, r, player, course);
    if (res) {
      pts += res.points;
      quota += res.quota;
      any = true;
    }
  });
  return any ? { points: pts, quota, result: pts - quota } : null;
}
function seasonPointsForRank(settings, rank) {
  const arr = settings.seasonPointsByFinish;
  if (!arr.length) return 0;
  if (rank <= arr.length) return arr[rank - 1];
  return arr[arr.length - 1];
}
function computeEventRanking(settings, event, rounds, courses, players) {
  const results = players
    .map((p) => ({ id: p.id, r: eventResultForPlayer(settings, event, rounds, courses, p) }))
    .filter((x) => x.r);
  results.sort((a, b) => b.r.result - a.r.result);
  const pointsMap = {};
  results.forEach((x, i) => (pointsMap[x.id] = seasonPointsForRank(settings, i + 1)));
  return { pointsMap, ranked: results };
}
function computeSeason(settings, rounds, courses, players) {
  const events = getEvents(rounds);
  const perPlayerPts = {};
  const perPlayerRaw = {};
  players.forEach((p) => {
    perPlayerPts[p.id] = [];
    perPlayerRaw[p.id] = [];
  });
  events.forEach((ev) => {
    const { pointsMap, ranked } = computeEventRanking(settings, ev, rounds, courses, players);
    ranked.forEach((x) => {
      perPlayerPts[x.id].push(pointsMap[x.id]);
      perPlayerRaw[x.id].push(x.r.result);
    });
  });
  const seasonTotals = {};
  const rawTotals = {};
  const roundsPlayed = {};
  players.forEach((p) => {
    const sorted = [...perPlayerPts[p.id]].sort((a, b) => b - a);
    const top = sorted.slice(0, settings.topScoresCounted);
    seasonTotals[p.id] = top.reduce((a, b) => a + b, 0);
    const sortedRaw = [...perPlayerRaw[p.id]].sort((a, b) => b - a).slice(0, settings.topScoresCounted);
    rawTotals[p.id] = sortedRaw.reduce((a, b) => a + b, 0);
    roundsPlayed[p.id] = perPlayerPts[p.id].length;
  });
  const anyResults = players.some((p) => perPlayerPts[p.id].length > 0);
  return { seasonTotals, rawTotals, roundsPlayed, eventsCount: events.length, anyResults };
}
function computeSkinsForRound(round, allPlayers, course, settings) {
  if (round.entryMode !== 'holebyhole') return null;
  const optIn = (round.skinsOptIn || []).filter((id) => !Array.isArray(round.playerIds) || round.playerIds.includes(id));
  if (optIn.length < 2 || settings.skinsBuyIn <= 0) return null;
  const players = allPlayers.filter((p) => optIn.includes(p.id));
  const holes = roundHoles(round, course);
  const tee = getTee(course, round.teeName);
  const netMode = settings.skinsType === 'net';
  let strokesMap = {};
  if (netMode) {
    const fullPar = courseParTotal(course, 18);
    const chVals = players.map((p) => ({ id: p.id, ch: Math.round((p.handicap * tee.slope) / 113 + (tee.rating - fullPar)) }));
    const min = Math.min(...chVals.map((v) => v.ch));
    chVals.forEach((v) => (strokesMap[v.id] = v.ch - min));
  }
  const ranks = localRanks(holes);
  const tally = {};
  players.forEach((p) => (tally[p.id] = 0));
  let carry = 0,
    thru = 0;
  for (let h = 0; h < holes.length; h++) {
    const allIn = players.every((p) => round.playerData[p.id]?.holeScores?.[h] != null);
    if (!allIn) break;
    thru = h + 1;
    const vals = players.map((p) => {
      const g = round.playerData[p.id].holeScores[h];
      const v = netMode ? g - strokesOnHole(strokesMap[p.id] || 0, ranks[h], holes.length) : g;
      return { id: p.id, v };
    });
    const min = Math.min(...vals.map((v) => v.v));
    const winners = vals.filter((v) => v.v === min);
    carry += 1;
    if (winners.length === 1) {
      tally[winners[0].id] += carry;
      carry = 0;
    }
  }
  const totalSkins = Object.values(tally).reduce((a, b) => a + b, 0);
  const pot = settings.skinsBuyIn * players.length;
  const payouts = {};
  players.forEach((p) => (payouts[p.id] = totalSkins > 0 ? Math.round((tally[p.id] / totalSkins) * pot * 100) / 100 : 0));
  return { pot, players, tally, payouts, totalSkins, carry, thru };
}
// ---------- casual game scoring engines (built purely from raw per-hole gross scores) ----------
function grossOf(round, playerId, holeIdx) {
  return round.playerData[playerId]?.holeScores?.[holeIdx];
}
function strokePlayBoard(round, course, players) {
  const holes = roundHoles(round, course);
  return players
    .map((p) => {
      let total = 0,
        thru = 0;
      holes.forEach((h, i) => {
        const g = grossOf(round, p.id, i);
        if (g != null) {
          total += g;
          thru++;
        }
      });
      return { p, total, thru };
    })
    .sort((a, b) => (a.thru === 0 ? 1 : b.thru === 0 ? -1 : a.total - b.total));
}
function stablefordBoard(round, course, players) {
  const holes = roundHoles(round, course);
  return players
    .map((p) => {
      let total = 0,
        thru = 0;
      holes.forEach((h, i) => {
        const g = grossOf(round, p.id, i);
        if (g != null) {
          total += stablefordPoints(g, h.par);
          thru++;
        }
      });
      return { p, total, thru };
    })
    .sort((a, b) => b.total - a.total);
}
function matchSegment(round, course, players, startHole, endHole) {
  if (players.length !== 2) return null;
  const holes = roundHoles(round, course);
  const end = Math.min(endHole, holes.length);
  const [a, b] = players;
  let diff = 0,
    thru = 0;
  for (let h = startHole; h < end; h++) {
    const av = grossOf(round, a.id, h);
    const bv = grossOf(round, b.id, h);
    if (av == null || bv == null) break;
    thru++;
    if (av < bv) diff++;
    else if (bv < av) diff--;
  }
  const segHoles = end - startHole;
  const remaining = segHoles - thru;
  const clinched = thru > 0 && Math.abs(diff) > remaining;
  return { diff, thru, remaining, clinched, segHoles, a, b };
}
function matchLabel(seg) {
  if (!seg || seg.thru === 0) return 'Not started';
  if (seg.clinched) return `${Math.abs(seg.diff)} & ${seg.remaining}`;
  if (seg.diff === 0) return `All Square · thru ${seg.thru}`;
  return `${Math.abs(seg.diff)} UP · thru ${seg.thru}`;
}
function ninesBoard(round, course, players) {
  if (players.length !== 3) return null;
  const holes = roundHoles(round, course);
  const pts = {};
  players.forEach((p) => (pts[p.id] = 0));
  let thru = 0;
  for (let h = 0; h < holes.length; h++) {
    const vals = players.map((p) => ({ id: p.id, v: grossOf(round, p.id, h) }));
    if (vals.some((v) => v.v == null)) break;
    thru = h + 1;
    const sorted = [...vals].sort((a, b) => a.v - b.v);
    const POOL = [5, 3, 1];
    let i = 0;
    while (i < 3) {
      let j = i;
      while (j + 1 < 3 && sorted[j + 1].v === sorted[i].v) j++;
      const group = sorted.slice(i, j + 1);
      const share = POOL.slice(i, j + 1).reduce((a, b) => a + b, 0) / group.length;
      group.forEach((m) => (pts[m.id] += share));
      i = j + 1;
    }
  }
  return { pts, thru };
}
function wolfBoard(round, course, players) {
  const picks = round.gameData?.wolfPicks || {};
  const holes = roundHoles(round, course);
  const pts = {};
  players.forEach((p) => (pts[p.id] = 0));
  let thru = 0;
  for (let h = 0; h < holes.length; h++) {
    const pick = picks[h];
    const allScores = players.every((p) => grossOf(round, p.id, h) != null);
    if (!pick || !pick.wolf || !allScores) break;
    if (!pick.partner && !pick.lone) break;
    thru = h + 1;
    const wolfId = pick.wolf;
    const others = players.map((p) => p.id).filter((id) => id !== wolfId);
    if (pick.lone) {
      const wolfScore = grossOf(round, wolfId, h);
      const bestOther = Math.min(...others.map((id) => grossOf(round, id, h)));
      if (wolfScore < bestOther) pts[wolfId] += 6;
      else if (wolfScore > bestOther) others.forEach((id) => (pts[id] += 2));
    } else {
      const teamIds = [wolfId, pick.partner];
      const oppIds = others.filter((id) => id !== pick.partner);
      const teamBest = Math.min(...teamIds.map((id) => grossOf(round, id, h)));
      const oppBest = Math.min(...oppIds.map((id) => grossOf(round, id, h)));
      if (teamBest < oppBest) teamIds.forEach((id) => (pts[id] += 2));
      else if (oppBest < teamBest) oppIds.forEach((id) => (pts[id] += 2));
    }
  }
  return { pts, thru };
}
function bbbBoard(round, players) {
  const picks = round.gameData?.bbbPicks || {};
  const pts = {};
  players.forEach((p) => (pts[p.id] = 0));
  Object.values(picks).forEach((h) => {
    ['bingo', 'bango', 'bongo'].forEach((k) => {
      if (h[k]) pts[h[k]] = (pts[h[k]] || 0) + 1;
    });
  });
  return pts;
}

function purseForRound(settings, round, players, course) {
  const scored = players.filter((p) => playerPointsInRound(round, p, course) != null);
  const pot = settings.purseBuyIn * scored.length;
  const rake = scored.length > 0 ? settings.seasonRakePerRound : 0;
  const payoutPool = Math.max(0, pot - rake);
  const ranked = scored
    .map((p) => ({ id: p.id, result: playerResultInRound(settings, round, p, course).result }))
    .sort((a, b) => b.result - a.result);
  const payouts = {};
  ranked.forEach((r, i) => {
    const pct = settings.purseSplits[i] || 0;
    payouts[r.id] = Math.round((payoutPool * pct) / 100);
  });
  return { pot, rake, payoutPool, ranked, payouts, scoredCount: scored.length };
}

      {isConnected ? (
        <>
          <p className="text-sm mb-1" style={{ color: C.muted }}>
            Everyone using League ID <b style={{ color: C.text }}>{cloudLeagueId}</b> shares this data live — scores, the calendar, live scoring, all of it.
          </p>
          <button onClick={copyLeagueId} className="text-xs font-semibold mb-3" style={{ color: C.lime }}>
            {copied ? '✓ Copied' : 'Copy League ID to share'}
          </button>
          <GhostButton onClick={disconnect} color={C.red} style={{ width: '100%', textAlign: 'center' }}>
            Disconnect (go local-only)
          </GhostButton>
        </>
      ) : (
        !isUnavailable && (
          <>
            <p className="text-sm mb-3" style={{ color: C.muted }}>
              This app is already connected to a Firebase project. Pick a League ID your whole group will use — everyone who enters the same one shares data live.
            </p>
            <TextField label="League ID (share this with your group)" value={leagueIdInput} onChange={setLeagueIdInput} placeholder="e.g. birmingham-dogfight" />

            <button onClick={() => setUseCustom((v) => !v)} className="text-xs font-semibold mt-3 mb-1" style={{ color: C.muted }}>
              {useCustom ? '← Use the built-in project instead' : 'Use a different Firebase project instead'}
            </button>
            <Collapse open={useCustom}>
              <div className="mt-2">
                <InfoNote>
                  <div className="space-y-1.5">
                    <div>1. Go to console.firebase.google.com → Add project (it's free).</div>
                    <div>2. Click the Web icon (&lt;/&gt;) to register a web app — name it anything.</div>
                    <div>
                      3. It'll show a <code>firebaseConfig</code> object — copy the whole thing.
                    </div>
                    <div>4. In the left sidebar: Build → Firestore Database → Create database.</div>
                    <div>
                      5. Open the <b>Rules</b> tab there and paste this in, then Publish:
                    </div>
                  </div>
                  <pre className="mt-2 p-2 rounded-lg overflow-x-auto" style={{ background: C.surface3, fontSize: 10, color: C.text }}>
                    {rulesText}
                  </pre>
                  <div className="mt-2" style={{ color: C.orange }}>
                    Heads up: those rules let anyone with the League ID read or write that league's data — fine for a friend group, just don't use anything guessable or sensitive.
                  </div>
                </InfoNote>
                <div className="mb-2">
                  <div className="text-[10px] uppercase tracking-wide mb-1" style={{ color: C.muted }}>
                    Firebase config — paste the whole object
                  </div>
                  <textarea
                    value={configText}
                    onChange={(e) => setConfigText(e.target.value)}
                    placeholder={'{\n  apiKey: "...",\n  authDomain: "...",\n  projectId: "...",\n  ...\n}'}
                    rows={6}
                    className="w-full rounded-2xl px-3 py-2.5 text-xs outline-none font-mono"
                    style={{ background: C.surface2, color: C.text, border: `1px solid ${C.border}` }}
                  />
                </div>
              </div>
            </Collapse>

            {localErr && (
              <div className="text-xs mb-2" style={{ color: C.red }}>
                {localErr}
              </div>
            )}
            <PrimaryButton
              onClick={connect}
              disabled={!leagueIdInput.trim() || (useCustom && !configText.trim())}
              style={{ width: '100%', textAlign: 'center', marginTop: 8 }}
            >
              Connect
            </PrimaryButton>
          </>
        )
      )}
    </Card>
  );
}

// ---------- Standings tab ----------
function StandingsTab({ settings, players, rounds, courses, onGoPlayers }) {
  const leagueRounds = rounds.filter((r) => !r.casual);
  const season = computeSeason(settings, leagueRounds, courses, players);
  const [awards, setAwards] = useState(null);
  const [awardsLoading, setAwardsLoading] = useState(false);
  const [awardsError, setAwardsError] = useState('');
  const team1 = players.filter((p) => p.team === 'team1');
  const team2 = players.filter((p) => p.team === 'team2');
  const t1pts = team1.reduce((s, p) => s + (season.seasonTotals[p.id] || 0), 0);
  const t2pts = team2.reduce((s, p) => s + (season.seasonTotals[p.id] || 0), 0);
  const t1raw = team1.reduce((s, p) => s + (season.rawTotals[p.id] || 0), 0);
  const t2raw = team2.reduce((s, p) => s + (season.rawTotals[p.id] || 0), 0);
  const total = t1pts + t2pts;
  const t1pct = total > 0 ? Math.round((t1pts / total) * 100) : 50;

  const moneyByPlayer = {};
  players.forEach((p) => (moneyByPlayer[p.id] = 0));
  leagueRounds.forEach((r) => {
    const course = courses.find((c) => c.id === r.courseId);
    if (!course) return;
    const { payouts } = purseForRound(settings, r, players, course);
    Object.entries(payouts).forEach(([pid, amt]) => (moneyByPlayer[pid] = (moneyByPlayer[pid] || 0) + amt));
  });
  const t1money = team1.reduce((s, p) => s + moneyByPlayer[p.id], 0);
  const t2money = team2.reduce((s, p) => s + moneyByPlayer[p.id], 0);

  const moneyInPlay = leagueRounds.reduce((sum, r) => {
    const course = courses.find((c) => c.id === r.courseId);
    if (!course) return sum;
    const scored = players.filter((p) => playerPointsInRound(r, p, course) != null).length;
    return sum + settings.purseBuyIn * scored;
  }, 0);
  const seasonBuyIns = settings.seasonBuyIn * players.length;
  const countingRounds = leagueRounds.filter((r) => {
    const course = courses.find((c) => c.id === r.courseId);
    return course && players.some((p) => playerPointsInRound(r, p, course) != null);
  });
  const weeklyRake = countingRounds.length * settings.seasonRakePerRound;
  const totalPool = seasonBuyIns + weeklyRake;

  const leaderboard = [...players].sort((a, b) => (season.seasonTotals[b.id] || 0) - (season.seasonTotals[a.id] || 0));
  const leader = season.anyResults ? leaderboard[0] : null;

  const skinsByPlayer = {};
  players.forEach((p) => (skinsByPlayer[p.id] = 0));
  leagueRounds.forEach((r) => {
    const course = courses.find((c) => c.id === r.courseId);
    if (!course) return;
    const skins = computeSkinsForRound(r, players, course, settings);
    if (skins) Object.entries(skins.tally).forEach(([pid, count]) => (skinsByPlayer[pid] = (skinsByPlayer[pid] || 0) + count));
  });

  async function generateAwards() {
    setAwardsError('');
    setAwards(null);
    if (!season.anyResults) {
      setAwardsError('Play at least one round first.');
      return;
    }
    setAwardsLoading(true);
    const summary = leaderboard
      .map(
        (p, i) =>
          `${p.name}: rank #${i + 1}, ${season.seasonTotals[p.id] || 0} season pts, ${(season.rawTotals[p.id] || 0) >= 0 ? '+' : ''}${season.rawTotals[p.id] || 0} vs quota, ${season.roundsPlayed[p.id] || 0} rounds played, ${skinsByPlayer[p.id] || 0} skins won, team ${p.team === 'team1' ? settings.team1Name : settings.team2Name}`
      )
      .join('\n');
    const prompt = `You are writing a fun, lighthearted end-of-season awards write-up for a golf betting league called "${settings.leagueName}". Here is the season data, one line per player:
${summary}

Team battle: ${settings.team1Name} ${t1pts} pts vs ${settings.team2Name} ${t2pts} pts.

Write 5 to 6 award categories (invent fitting categories from the data — things like season champion, most skins won, biggest overachiever vs quota, most rounds played / most dedicated, closest rivalry, etc). For each award, pick a real player from the data above by exact name where it fits the category. Keep the tone fun, warm, a little teasing — like a golf buddies group chat, not a corporate write-up. Each blurb should be 1-2 sentences and reference an actual stat from the data.
Respond with ONLY this JSON, no other text: [{"title": "Award Name", "player": "Full Name", "blurb": "1-2 sentence writeup"}]`;
    const res = await callGeminiJSON(prompt);
    setAwardsLoading(false);
    if (!res.ok) {
      setAwardsError(res.error);
      return;
    }
    if (!Array.isArray(res.data)) {
      setAwardsError("That didn't come back right — give it another tap.");
      return;
    }
    setAwards(res.data);
  }

  return (
    <div>
      <Card>
        <div className="font-display text-xl mb-1" style={{ color: C.text }}>
          Season Team Battle
        </div>
        <div className="text-xs mb-3" style={{ color: C.muted }}>
          {t1pts === t2pts ? 'All square' : t1pts > t2pts ? `${settings.team1Name} leads` : `${settings.team2Name} leads`} · season-long points
        </div>
        <div className="grid grid-cols-2 gap-3">
          <div className="rounded-2xl p-3" style={{ background: C.surface2 }}>
            <div className="text-[11px] uppercase" style={{ color: C.muted }}>
              {settings.team1Name} ({team1.length})
            </div>
            <div className="font-display text-2xl" style={{ color: C.text }}>
              {t1pts} <span className="text-sm font-sans" style={{ color: C.muted }}>pts</span>
            </div>
            <div className="text-[11px]" style={{ color: C.faint }}>
              {t1raw >= 0 ? '+' : ''}
              {t1raw} +/- · ${t1money}
            </div>
          </div>
          <div className="rounded-2xl p-3" style={{ background: C.surface2 }}>
            <div className="text-[11px] uppercase" style={{ color: C.muted }}>
              {settings.team2Name} ({team2.length})
            </div>
            <div className="font-display text-2xl" style={{ color: C.text }}>
              {t2pts} <span className="text-sm font-sans" style={{ color: C.muted }}>pts</span>
            </div>
            <div className="text-[11px]" style={{ color: C.faint }}>
              {t2raw >= 0 ? '+' : ''}
              {t2raw} +/- · ${t2money}
            </div>
          </div>
        </div>
        <div className="mt-3 h-2 rounded-full overflow-hidden flex" style={{ background: C.surface2 }}>
          <div className="bar-fill" style={{ width: `${t1pct}%`, background: C.lime }} />
          <div className="bar-fill" style={{ width: `${100 - t1pct}%`, background: C.gold }} />
        </div>
        <div className="flex justify-between text-[11px] mt-1" style={{ color: C.faint }}>
          <span>{settings.team1Name} {t1pct}%</span>
          <span>{settings.team2Name} {100 - t1pct}%</span>
        </div>
      </Card>

      <Card>
        <div className="font-display text-xl mb-1" style={{ color: C.text }}>
          Season Prize Pool
        </div>
        <div className="text-xs mb-3" style={{ color: C.muted }}>
          ${settings.seasonBuyIn} season buy-in per player + ${settings.seasonRakePerRound} per round from the purse
        </div>
        <div className="grid grid-cols-2 gap-3">
          <StatTile label="Total Pool" value={`$${totalPool.toLocaleString()}`} accent />
          <StatTile label="Season Buy-ins" value={`$${seasonBuyIns.toLocaleString()}`} sub={`${players.length}×$${settings.seasonBuyIn}`} />
        </div>
        <div className="mt-3">
          <StatTile label="Weekly Rake" value={`$${weeklyRake.toLocaleString()}`} />
        </div>
      </Card>

      <Card>
        <div className="font-display text-xl" style={{ color: C.text }}>
          Season Standings
        </div>
        <div className="text-xs mb-3" style={{ color: C.muted }}>
          {leagueRounds.length} round{leagueRounds.length === 1 ? '' : 's'} played · {players.length} players · ${moneyInPlay.toLocaleString()} put in play
        </div>
        <div className="grid grid-cols-2 gap-3 mb-3">
          <StatTile label="Current Leader" value={leader ? leader.name : '—'} />
          <StatTile label="Leader's Pts" value={leader ? season.seasonTotals[leader.id] : '—'} sub="season pts" />
        </div>
        <div className="grid grid-cols-2 gap-3">
          <StatTile label="Rounds Played" value={leagueRounds.length} />
          <StatTile label="Money In Play" value={`$${moneyInPlay.toLocaleString()}`} />
        </div>
      </Card>

      {!season.anyResults ? (
        <Card style={{ textAlign: 'center' }}>
          <p className="text-sm mb-3" style={{ color: C.muted }}>
            No scores yet. Add players, then create a round under <b style={{ color: C.text }}>Rounds & Scores</b>.
          </p>
          {players.length === 0 && (
            <PrimaryButton onClick={onGoPlayers} style={{ margin: '0 auto' }}>
              Add Players
            </PrimaryButton>
          )}
        </Card>
      ) : (
        <Card>
          <div className="font-display text-lg mb-2" style={{ color: C.text }}>
            Individual Standings
          </div>
          {leaderboard.map((p, i) => (
            <div key={p.id} className="flex items-center justify-between py-2 row-in" style={{ borderBottom: `1px solid ${C.border}`, animationDelay: `${Math.min(i, 12) * 0.04}s` }}>
              <div className="flex items-center gap-2 min-w-0">
                <span className="font-display text-xs w-5" style={{ color: i === 0 ? C.gold : C.faint }}>
                  {i + 1}
                </span>
                <span className="truncate" style={{ color: i === 0 ? C.text : C.muted, fontWeight: i === 0 ? 700 : 500 }}>
                  {p.name}
                </span>
              </div>
              <div className="flex items-center gap-2 shrink-0">
                <span className="text-[10px]" style={{ color: C.faint }}>
                  thru {season.roundsPlayed[p.id]}
                </span>
                <span className="font-display text-base" style={{ color: i === 0 ? C.gold : C.text, textShadow: i === 0 ? '0 0 10px rgba(255,214,10,0.45)' : 'none' }}>
                  {season.seasonTotals[p.id]}
                </span>
              </div>
            </div>
          ))}
        </Card>
      )}

      {season.anyResults && (
        <Card>
          <div className="font-display text-xl mb-1" style={{ color: C.text }}>
            🏆 AI Season Awards
          </div>
          <p className="text-xs mb-3" style={{ color: C.muted }}>
            Generate a fun awards write-up from this season's actual standings, skins, and quota results.
          </p>
          <PrimaryButton onClick={generateAwards} disabled={awardsLoading} style={{ width: '100%', textAlign: 'center' }}>
            {awardsLoading ? 'Writing…' : awards ? '✨ Regenerate Awards' : '✨ Generate Awards'}
          </PrimaryButton>
          {awardsError && (
            <div className="text-xs mt-2" style={{ color: C.red }}>
              {awardsError}
            </div>
          )}
          {awards && (
            <div className="mt-3">
              {awards.map((a, i) => (
                <div key={i} className="rounded-2xl p-3 mb-2 row-in" style={{ background: C.surface2, animationDelay: `${i * 0.08}s` }}>
                  <div className="flex items-center gap-2 mb-1">
                    <span className="text-base">🏅</span>
                    <span className="font-display text-base" style={{ color: C.gold }}>
                      {a.title}
                    </span>
                  </div>
                  {a.player && (
                    <div className="text-sm font-semibold mb-1" style={{ color: C.lime }}>
                      {a.player}
                    </div>
                  )}
                  <p className="text-xs leading-relaxed" style={{ color: C.text }}>
                    {a.blurb}
                  </p>
                </div>
              ))}
            </div>
          )}
        </Card>
      )}
    </div>
  );
}

// ---------- Skins tab ----------
function SkinsTab({ settings, players, rounds, courses }) {
  const skinsRounds = rounds
    .map((r) => ({ round: r, course: courses.find((c) => c.id === r.courseId) }))
    .filter((x) => x.course)
    .map((x) => ({ ...x, skins: computeSkinsForRound(x.round, players, x.course, settings) }))
    .filter((x) => x.skins);

  return (
    <div>
      <Card>
        <div className="font-display text-xl mb-1" style={{ color: C.text }}>
          Skins Game
        </div>
        <p className="text-sm" style={{ color: C.muted }}>
          {settings.skinsType === 'gross' ? 'Gross' : 'Net'} skins · ${settings.skinsBuyIn} buy-in per player · low score on a hole wins; ties carry over.
        </p>
      </Card>

      {skinsRounds.length === 0 ? (
        <Card>
          <p className="text-sm text-center" style={{ color: C.muted }}>
            No hole-by-hole scores entered yet. In <b style={{ color: C.text }}>Rounds & Scores</b>, switch a round to <b style={{ color: C.text }}>Hole-by-hole</b> entry.
          </p>
        </Card>
      ) : (
        skinsRounds.map(({ round, course, skins }) => (
          <Card key={round.id}>
            <div className="flex items-center justify-between mb-2">
              <div>
                <div className="font-display text-lg" style={{ color: C.text }}>
                  {round.date}
                </div>
                <div className="text-xs" style={{ color: C.muted }}>
                  {course.name} · {round.holes}-hole {round.casual && <span style={{ color: C.cyan }}>· casual</span>}
                </div>
              </div>
              <StatTile label="Pot" value={`$${skins.pot}`} />
            </div>
            {skins.players
              .map((p) => ({ p, count: skins.tally[p.id], pay: skins.payouts[p.id] }))
              .sort((a, b) => b.count - a.count)
              .map(({ p, count, pay }) => (
                <div key={p.id} className="flex items-center justify-between py-1.5" style={{ borderBottom: `1px solid ${C.border}` }}>
                  <span style={{ color: count > 0 ? C.text : C.muted, fontWeight: count > 0 ? 600 : 400 }}>{p.name}</span>
                  <span className="font-display text-sm" style={{ color: count > 0 ? C.gold : C.faint }}>
                    {count} skin{count === 1 ? '' : 's'} · ${pay.toFixed(2)}
                  </span>
                </div>
              ))}
            {skins.carry > 0 && (
              <div className="text-[11px] mt-2" style={{ color: C.orange }}>
                {skins.carry} skin{skins.carry > 1 ? 's' : ''} still carrying (thru {skins.thru})
              </div>
            )}
          </Card>
        ))
      )}
    </div>
  );
}

// ---------- Calendar tab (availability scheduling) ----------
function isoDate(y, m, d) {
  return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
}
function dayAvailability(availability, dateKey) {
  return availability[dateKey] || {};
}
function countAvail(dayData, session) {
  return Object.values(dayData).filter((v) => v && v[session]).length;
}
function CalendarTab({ players, availability, setAvailability }) {
  const today = new Date();
  const todayKey = isoDate(today.getFullYear(), today.getMonth(), today.getDate());
  const [viewYear, setViewYear] = useState(today.getFullYear());
  const [viewMonth, setViewMonth] = useState(today.getMonth());
  const [selectedDay, setSelectedDay] = useState(todayKey);

  function shiftMonth(delta) {
    let m = viewMonth + delta,
      y = viewYear;
    if (m < 0) {
      m = 11;
      y--;
    }
    if (m > 11) {
      m = 0;
      y++;
    }
    setViewMonth(m);
    setViewYear(y);
  }

  function toggleAvail(dateKey, playerId, session) {
    setAvailability((av) => {
      const day = { ...(av[dateKey] || {}) };
      const cur = { am: false, pm: false, ...(day[playerId] || {}) };
      cur[session] = !cur[session];
      if (!cur.am && !cur.pm) delete day[playerId];
      else day[playerId] = cur;
      const next = { ...av };
      if (Object.keys(day).length === 0) delete next[dateKey];
      else next[dateKey] = day;
      return next;
    });
  }

  const monthName = new Date(viewYear, viewMonth, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  const firstDow = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const selData = dayAvailability(availability, selectedDay);
  const selDate = new Date(selectedDay + 'T00:00:00');
  const selLabel = isNaN(selDate.getTime()) ? selectedDay : selDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  const amPlayers = players.filter((p) => selData[p.id]?.am);
  const pmPlayers = players.filter((p) => selData[p.id]?.pm);

  // upcoming days (from today) with any availability, for the tee-time planner
  const upcoming = Object.keys(availability)
    .filter((k) => k >= todayKey)
    .sort()
    .slice(0, 6)
    .map((k) => {
      const d = dayAvailability(availability, k);
      return { key: k, am: countAvail(d, 'am'), pm: countAvail(d, 'pm') };
    })
    .filter((x) => x.am > 0 || x.pm > 0);

  function SessionSection({ label, session, icon, availList }) {
    return (
      <div className="mb-4 last:mb-0">
        <div className="flex items-center justify-between mb-2">
          <div className="text-[10px] uppercase tracking-wide" style={{ color: C.lime }}>
            {icon} {label}
          </div>
          <div className="text-[11px] font-display" style={{ color: availList.length >= 2 ? C.gold : C.faint }}>
            {availList.length} in{availList.length >= 4 ? ' — full group!' : availList.length >= 2 ? ' — enough to play' : ''}
          </div>
        </div>
        {availList.length > 0 && (
          <div className="text-xs mb-2" style={{ color: C.text }}>
            {availList.map((p) => p.name.split(/\s+/)[0]).join(', ')}
          </div>
        )}
        <div className="flex flex-wrap gap-2">
          {players.map((p) => {
            const on = selData[p.id]?.[session];
            return (
              <button
                key={p.id}
                onClick={() => toggleAvail(selectedDay, p.id, session)}
                className="px-3 py-1.5 rounded-full text-xs font-semibold tap"
                style={{ background: on ? C.lime : C.surface2, color: on ? '#000' : C.muted, transition: 'background-color 0.2s ease, color 0.2s ease, transform 0.12s ease' }}
              >
                {p.name.split(/\s+/)[0]}
              </button>
            );
          })}
        </div>
      </div>
    );
  }

  return (
    <div>
      <Card>
        <div className="flex items-center justify-between mb-3">
          <button onClick={() => shiftMonth(-1)} className="w-9 h-9 rounded-full flex items-center justify-center" style={{ background: C.surface2, color: C.text }}>
            ‹
          </button>
          <div className="font-display text-xl" style={{ color: C.text }}>
            {monthName}
          </div>
          <button onClick={() => shiftMonth(1)} className="w-9 h-9 rounded-full flex items-center justify-center" style={{ background: C.surface2, color: C.text }}>
            ›
          </button>
        </div>
        <div className="grid grid-cols-7 gap-1 mb-1">
          {['S', 'M', 'T', 'W', 'T', 'F', 'S'].map((d, i) => (
            <div key={i} className="text-center text-[10px] uppercase py-1" style={{ color: C.faint }}>
              {d}
            </div>
          ))}
        </div>
        <div className="grid grid-cols-7 gap-1">
          {cells.map((d, i) => {
            if (d == null) return <div key={i} />;
            const key = isoDate(viewYear, viewMonth, d);
            const dayData = dayAvailability(availability, key);
            const am = countAvail(dayData, 'am');
            const pm = countAvail(dayData, 'pm');
            const isToday = key === todayKey;
            const isSelected = key === selectedDay;
            return (
              <button
                key={i}
                onClick={() => setSelectedDay(key)}
                className="rounded-xl flex flex-col items-center justify-center py-1.5 tap"
                style={{
                  background: isSelected ? C.lime : C.surface2,
                  border: isToday && !isSelected ? `1.5px solid ${C.lime}` : '1.5px solid transparent',
                  minHeight: 44,
                  transition: 'background-color 0.2s ease, border-color 0.2s ease, transform 0.12s ease',
                }}
              >
                <span className="font-display text-sm leading-none" style={{ color: isSelected ? '#000' : C.text, transition: 'color 0.2s ease' }}>
                  {d}
                </span>
                {(am > 0 || pm > 0) && (
                  <span className="flex gap-0.5 mt-1">
                    {am > 0 && <span className="w-1.5 h-1.5 rounded-full" style={{ background: isSelected ? '#000' : C.lime }} />}
                    {pm > 0 && <span className="w-1.5 h-1.5 rounded-full" style={{ background: isSelected ? '#000' : C.gold }} />}
                  </span>
                )}
              </button>
            );
          })}
        </div>
        <div className="flex items-center gap-3 mt-3 text-[10px]" style={{ color: C.faint }}>
          <span>
            <span className="inline-block w-1.5 h-1.5 rounded-full mr-1" style={{ background: C.lime }} />
            morning
          </span>
          <span>
            <span className="inline-block w-1.5 h-1.5 rounded-full mr-1" style={{ background: C.gold }} />
            afternoon
          </span>
          <span className="ml-auto">Tap your name to mark yourself in</span>
        </div>
      </Card>

      <Card>
        <div className="font-display text-lg mb-3" style={{ color: C.text }}>
          {selLabel}
        </div>
        <SessionSection label="Morning" session="am" icon="🌅" availList={amPlayers} />
        <SessionSection label="Afternoon" session="pm" icon="🌇" availList={pmPlayers} />
      </Card>

      {upcoming.length > 0 && (
        <Card>
          <div className="font-display text-lg mb-1" style={{ color: C.text }}>
            Tee Time Planner
          </div>
          <p className="text-xs mb-2" style={{ color: C.muted }}>
            Upcoming days with players marked available — tap one to see who's in.
          </p>
          {upcoming.map(({ key, am, pm }) => {
            const d = new Date(key + 'T00:00:00');
            const label = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            return (
              <button key={key} onClick={() => setSelectedDay(key)} className="w-full flex items-center justify-between py-2" style={{ borderBottom: `1px solid ${C.border}` }}>
                <span className="text-sm" style={{ color: C.text }}>
                  {label}
                </span>
                <span className="text-xs font-display" style={{ color: C.muted }}>
                  {am > 0 && <span style={{ color: C.lime }}>{am} AM</span>}
                  {am > 0 && pm > 0 && ' · '}
                  {pm > 0 && <span style={{ color: C.gold }}>{pm} PM</span>}
                </span>
              </button>
            );
          })}
        </Card>
      )}
    </div>
  );
}

// ---------- Game Finder tab (casual, non-league rounds) ----------
function GameFinderTab({ players, courses, setRounds, setEditingRoundId, setActiveTab }) {
  const [selectedIds, setSelectedIds] = useState([]);
  const [guests, setGuests] = useState(0);
  const [expandedId, setExpandedId] = useState(null);
  const [selectedGameId, setSelectedGameId] = useState(null);

  const n = selectedIds.length + guests;
  const selectedGame = GAME_LIBRARY.find((g) => g.id === selectedGameId) || null;

  function toggle(id) {
    setSelectedIds((ids) => (ids.includes(id) ? ids.filter((x) => x !== id) : [...ids, id]));
  }
  function selectGame(id) {
    setSelectedGameId((cur) => (cur === id ? null : id));
    setExpandedId(id);
  }

  function beginCasualRound() {
    if (selectedIds.length === 0) return;
    const course = courses[0];
    const r = {
      id: uid(),
      date: new Date().toISOString().slice(0, 10),
      courseId: course.id,
      teeName: course.tees[0].name,
      holes: 18,
      entryMode: 'holebyhole',
      combinedWith: null,
      playerIds: selectedIds,
      skinsOptIn: [],
      playerData: {},
      status: 'setup',
      currentHole: 0,
      pointsBasis: 'gross',
      casual: true,
      gameId: selectedGameId,
      gameData: {},
    };
    setRounds((rs) => [r, ...rs]);
    setEditingRoundId(r.id);
    setActiveTab('rounds');
  }

  const perfect = GAME_LIBRARY.filter((g) => n >= g.min && n <= g.max && g.ideal.includes(n));
  const works = GAME_LIBRARY.filter((g) => n >= g.min && n <= g.max && !g.ideal.includes(n));
  const notNow = GAME_LIBRARY.filter((g) => n < g.min || n > g.max);

  function GameRow({ g, dim, selectable }) {
    const open = expandedId === g.id;
    const selected = selectedGameId === g.id;
    return (
      <div
        className="w-full rounded-2xl p-3 mb-2"
        style={{ background: selected ? '#12140A' : open ? C.surface3 : C.surface2, border: `1.5px solid ${selected ? C.lime : open ? C.border : C.border}`, opacity: dim ? 0.45 : 1 }}
      >
        <button onClick={() => setExpandedId(open ? null : g.id)} className="w-full text-left">
          <div className="flex items-center justify-between gap-2">
            <div className="flex items-center gap-2 min-w-0">
              {selected && <Check size={14} style={{ color: C.lime, flexShrink: 0 }} />}
              <span className="font-display text-base truncate" style={{ color: C.text }}>
                {g.name}
              </span>
            </div>
            <span className="text-[10px] font-display shrink-0" style={{ color: C.muted }}>
              {g.min === g.max ? `${g.min} players` : `${g.min}–${g.max} players`}
            </span>
          </div>
          <div className="text-xs mt-0.5" style={{ color: C.muted }}>
            {g.blurb}
          </div>
          <div className="flex flex-wrap gap-1 mt-1.5">
            {g.tags.map((t) => (
              <span key={t} className="px-1.5 py-0.5 rounded-full text-[9px] uppercase tracking-wide" style={{ background: C.surface3, color: C.faint, border: `1px solid ${C.border}` }}>
                {t}
              </span>
            ))}
            {g.scoring !== 'manual' && (
              <span className="px-1.5 py-0.5 rounded-full text-[9px] uppercase tracking-wide" style={{ background: 'rgba(180,255,57,0.12)', color: C.lime, border: `1px solid ${C.lime}` }}>
                auto-scored
              </span>
            )}
          </div>
          {dim && (
            <div className="text-[11px] mt-1.5 font-semibold" style={{ color: C.pink }}>
              {n < g.min ? `Needs at least ${g.min} players` : `Max ${g.max} players`}
            </div>
          )}
        </button>
        <Collapse open={open}>
          <div className="mt-2 pt-2" style={{ borderTop: `1px solid ${C.border}` }}>
            <div className="text-[10px] uppercase tracking-wide mb-1" style={{ color: C.lime }}>
              How to play
            </div>
            <p className="text-xs leading-relaxed" style={{ color: C.text }}>
              {g.rules}
            </p>
            <div className="text-[10px] uppercase tracking-wide mt-2 mb-1" style={{ color: C.gold }}>
              The bet
            </div>
            <p className="text-xs leading-relaxed mb-2" style={{ color: C.muted }}>
              {g.bet}
            </p>
            {selectable && (
              <button
                onClick={() => selectGame(g.id)}
                className="w-full py-2 rounded-xl text-xs font-bold text-center tap"
                style={{ background: selected ? C.surface2 : C.lime, color: selected ? C.text : '#000' }}
              >
                {selected ? '✓ Selected for this round — tap to unselect' : `Play ${g.name}`}
              </button>
            )}
          </div>
        </Collapse>
      </div>
    );
  }

  return (
    <div>
      <Card>
        <div className="font-display text-xl mb-1" style={{ color: C.text }}>
          Game Finder
        </div>
        <p className="text-xs mb-3" style={{ color: C.muted }}>
          For casual rounds outside the league. Pick who's playing and see every game that fits your group.
        </p>
        <div className="grid grid-cols-2 gap-2 mb-3">
          {players.map((p) => (
            <button key={p.id} onClick={() => toggle(p.id)} className="flex items-center gap-2 rounded-xl px-3 py-2 text-left tap" style={{ background: C.surface2 }}>
              <span
                key={selectedIds.includes(p.id) ? 'on' : 'off'}
                className="w-4 h-4 rounded shrink-0 check-pop"
                style={{
                  background: selectedIds.includes(p.id) ? C.lime : 'transparent',
                  border: `1.5px solid ${selectedIds.includes(p.id) ? C.lime : C.faint}`,
                  transition: 'background-color 0.15s ease, border-color 0.15s ease',
                }}
              />
              <span className="text-sm truncate" style={{ color: C.text }}>
                {p.name}
              </span>
            </button>
          ))}
        </div>
        <div className="flex items-center justify-between mb-3">
          <span className="text-xs" style={{ color: C.muted }}>
            Guests (not in the league)
          </span>
          <NumStepper value={guests} onChange={setGuests} min={0} max={8} />
        </div>
        {selectedGame && (
          <div className="flex items-center justify-between rounded-xl px-3 py-2 mb-3" style={{ background: '#12140A', border: `1px solid ${C.lime}` }}>
            <span className="text-xs" style={{ color: C.muted }}>
              Playing
            </span>
            <span className="font-display text-sm" style={{ color: C.lime }}>
              {selectedGame.name}
            </span>
          </div>
        )}
        <PrimaryButton onClick={beginCasualRound} disabled={selectedIds.length === 0} style={{ width: '100%', textAlign: 'center' }}>
          ▶ Begin Round
        </PrimaryButton>
        {selectedIds.length === 0 ? (
          <div className="text-xs text-center mt-2" style={{ color: C.muted }}>
            Check off who's playing to begin
          </div>
        ) : (
          <div className="text-[11px] text-center mt-2" style={{ color: C.faint }}>
            {selectedGame ? `Scores and tracks ${selectedGame.name} live, ` : 'Uses live hole-by-hole scoring, '}just like a league round — but{' '}
            <span style={{ color: C.cyan, fontWeight: 600 }}>won't count toward Dogfight League standings</span>.
            {guests > 0 && ' Guests are counted for game suggestions above but can\'t be scored — only players in your Players list can.'}
          </div>
        )}
      </Card>

      {n === 0 ? (
        <Card>
          <p className="text-sm text-center" style={{ color: C.muted }}>
            Select at least one player above to see your options.
          </p>
        </Card>
      ) : (
        <>
          <div className="font-display text-lg mb-2 px-1" style={{ color: C.text }}>
            {n} playing — {perfect.length + works.length} game{perfect.length + works.length === 1 ? '' : 's'} fit
          </div>
          {perfect.length > 0 && (
            <>
              <SectionLabel>Perfect for {n}</SectionLabel>
              {perfect.map((g) => (
                <GameRow key={g.id} g={g} selectable />
              ))}
            </>
          )}
          {works.length > 0 && (
            <>
              <div className="mt-3">
                <SectionLabel>Also works</SectionLabel>
              </div>
              {works.map((g) => (
                <GameRow key={g.id} g={g} selectable />
              ))}
            </>
          )}
          {notNow.length > 0 && (
            <>
              <div className="mt-3">
                <div className="text-[11px] uppercase tracking-wide mb-2" style={{ color: C.faint }}>
                  Needs a different group size
                </div>
              </div>
              {notNow.map((g) => (
                <GameRow key={g.id} g={g} dim />
              ))}
            </>
          )}
          <InfoNote>
            Tap a game to see the rules, then tap "Play [Game]" to select it for this round — it'll show mid-round with a live scoreboard for that format. Games tagged <b style={{ color: C.lime }}>auto-scored</b> get a fully automatic scoreboard; the rest get a simple manual tally plus the rules to score it by hand. Most groups stack a main game with a side game like Snake or Dots.
          </InfoNote>
        </>
      )}
    </div>
  );
}

// ---------- Players tab ----------
function PlayersTab({ settings, players, setPlayers }) {
  const [form, setForm] = useState({ name: '', ghin: '', handicap: '', team: 'team1' });
  const [showGhinInfo, setShowGhinInfo] = useState(false);
  const [aiTeams, setAiTeams] = useState(null);
  const [aiLoading, setAiLoading] = useState(false);
  const [aiError, setAiError] = useState('');

  function addPlayer() {
    if (!form.name.trim()) return;
    setPlayers((ps) => [...ps, { id: uid(), name: form.name.trim(), ghin: form.ghin.trim(), handicap: Number(form.handicap) || 0, team: form.team }]);
    setForm({ name: '', ghin: '', handicap: '', team: 'team1' });
  }
  function updatePlayer(id, patch) {
    setPlayers((ps) => ps.map((p) => (p.id === id ? { ...p, ...patch } : p)));
  }
  function removePlayer(id) {
    setPlayers((ps) => ps.filter((p) => p.id !== id));
  }

  async function suggestTeams() {
    setAiError('');
    setAiTeams(null);
    if (players.length < 2) {
      setAiError('Add at least 2 players first.');
      return;
    }
    setAiLoading(true);
    const list = players.map((p) => `${p.name} (handicap ${p.handicap})`).join(', ');
    const prompt = `You are helping split a golf league roster into two balanced teams for a season-long team competition, based on handicap (lower handicap = better player).
Players: ${list}.
Split them into "team1" and "team2" so the two sides are as evenly matched as possible by skill (balance the average handicap on each side). Team sizes should differ by at most 1. Every player must be used exactly once, using their exact full name as given above.
Respond with ONLY this JSON shape, no other text: {"team1": ["Full Name", ...], "team2": ["Full Name", ...], "explanation": "one upbeat sentence explaining the split"}`;
    const res = await callGeminiJSON(prompt);
    setAiLoading(false);
    if (!res.ok) {
      setAiError(res.error);
      return;
    }
    const t1 = Array.isArray(res.data.team1) ? res.data.team1 : [];
    const t2 = Array.isArray(res.data.team2) ? res.data.team2 : [];
    const covered = new Set([...t1, ...t2]);
    const missing = players.filter((p) => !covered.has(p.name));
    if (missing.length > 0 || t1.length + t2.length !== players.length) {
      setAiError("That didn't quite match your roster — give it another tap to retry.");
      return;
    }
    setAiTeams({ team1: t1, team2: t2, explanation: res.data.explanation || '' });
  }
  function applyAiTeams() {
    if (!aiTeams) return;
    const t1set = new Set(aiTeams.team1);
    setPlayers((ps) => ps.map((p) => ({ ...p, team: t1set.has(p.name) ? 'team1' : 'team2' })));
    setAiTeams(null);
  }
  function avgHandicap(names) {
    const list = players.filter((p) => names.includes(p.name));
    if (list.length === 0) return 0;
    return Math.round((list.reduce((s, p) => s + p.handicap, 0) / list.length) * 10) / 10;
  }

  return (
    <div>
      <Card>
        <div className="flex items-start justify-between mb-2">
          <div>
            <div className="font-display text-xl" style={{ color: C.text }}>
              Players
            </div>
            <p className="text-xs mt-1" style={{ color: C.muted }}>
              Quota auto-calculates as {settings.quotaBase} − handicap. Edit a handicap anytime.
            </p>
          </div>
          <GhostButton onClick={() => setShowGhinInfo((v) => !v)} color={C.lime}>
            <RotateCcw size={12} style={{ display: 'inline', marginRight: 6 }} /> Sync from GHIN
          </GhostButton>
        </div>
        <Collapse open={showGhinInfo}>
          <InfoNote>
            GHIN doesn't offer a public live sync, so this stays a two-step process: add each player's GHIN number below, export a backup (Settings tab), refresh handicaps against GHIN on your computer, then import the updated file. Quotas recalculate automatically.
          </InfoNote>
        </Collapse>

        <div className="grid grid-cols-2 gap-2 mt-2">
          <TextField label="Name" value={form.name} onChange={(v) => setForm((f) => ({ ...f, name: v }))} placeholder="Player name" />
          <TextField label="GHIN #" value={form.ghin} onChange={(v) => setForm((f) => ({ ...f, ghin: v }))} placeholder="optional" />
          <TextField label="Handicap" value={form.handicap} onChange={(v) => setForm((f) => ({ ...f, handicap: v }))} placeholder="e.g. 14" type="number" />
          <SelectField
            label="Team"
            value={form.team}
            onChange={(v) => setForm((f) => ({ ...f, team: v }))}
            options={[
              { value: 'team1', label: settings.team1Name },
              { value: 'team2', label: settings.team2Name },
            ]}
          />
        </div>
        <PrimaryButton onClick={addPlayer} style={{ marginTop: 12 }}>
          Add
        </PrimaryButton>
      </Card>

      <Card>
        <div style={{ overflowX: 'auto' }}>
          <div style={{ minWidth: 560 }}>
            <div className="grid grid-cols-6 gap-2 text-[10px] uppercase tracking-wide pb-2" style={{ color: C.muted, borderBottom: `1px solid ${C.border}` }}>
              <div className="col-span-2">Player</div>
              <div>Team</div>
              <div>GHIN</div>
              <div>Handicap</div>
              <div>Quota</div>
            </div>
            {players.map((p) => (
              <div key={p.id} className="grid grid-cols-6 gap-2 items-center py-2" style={{ borderBottom: `1px solid ${C.border}` }}>
                <input
                  className="col-span-2 bg-transparent outline-none text-sm rounded-xl px-2 py-1.5"
                  style={{ background: C.surface2, color: C.text }}
                  value={p.name}
                  onChange={(e) => updatePlayer(p.id, { name: e.target.value })}
                />
                <select
                  value={p.team}
                  onChange={(e) => updatePlayer(p.id, { team: e.target.value })}
                  className="text-xs rounded-xl px-1.5 py-1.5 outline-none"
                  style={{ background: C.surface2, color: C.text }}
                >
                  <option value="team1">{settings.team1Name}</option>
                  <option value="team2">{settings.team2Name}</option>
                </select>
                <input
                  className="text-sm rounded-xl px-2 py-1.5 outline-none w-14"
                  style={{ background: C.surface2, color: C.text }}
                  value={p.ghin}
                  onChange={(e) => updatePlayer(p.id, { ghin: e.target.value })}
                />
                <input
                  type="number"
                  className="text-sm rounded-xl px-2 py-1.5 outline-none w-16"
                  style={{ background: C.surface2, color: C.text }}
                  value={p.handicap}
                  onChange={(e) => updatePlayer(p.id, { handicap: Number(e.target.value) })}
                />
                <div className="flex items-center justify-between">
                  <span className="font-display text-base" style={{ color: C.gold }}>
                    {quotaFromIndex(settings.quotaBase, p.handicap)}
                  </span>
                  <button onClick={() => removePlayer(p.id)} className="w-6 h-6 rounded-full flex items-center justify-center ml-1" style={{ background: C.surface2, color: C.red }}>
                    <X size={12} />
                  </button>
                </div>
              </div>
            ))}
            {players.length === 0 && (
              <div className="text-sm text-center py-6" style={{ color: C.muted }}>
                No players yet — add your first above.
              </div>
            )}
          </div>
        </div>
      </Card>

      <Card>
        <div className="flex items-center justify-between mb-1">
          <div className="font-display text-xl" style={{ color: C.text }}>
            🤖 Balanced Teams
          </div>
        </div>
        <p className="text-xs mb-3" style={{ color: C.muted }}>
          Let AI split the roster into two evenly matched teams by handicap for the season Team Battle.
        </p>
        <PrimaryButton onClick={suggestTeams} disabled={aiLoading} style={{ width: '100%', textAlign: 'center' }}>
          {aiLoading ? 'Thinking…' : '✨ Suggest Balanced Teams'}
        </PrimaryButton>
        {aiError && (
          <div className="text-xs mt-2" style={{ color: C.red }}>
            {aiError}
          </div>
        )}
        <Collapse open={!!aiTeams}>
          {aiTeams && (
            <div className="mt-3 pop-in">
              <div className="grid grid-cols-2 gap-2 mb-2">
                <div className="rounded-2xl p-3" style={{ background: C.surface2 }}>
                  <div className="text-[10px] uppercase tracking-wide mb-1" style={{ color: C.cyan }}>
                    {settings.team1Name} · avg {avgHandicap(aiTeams.team1)}
                  </div>
                  {aiTeams.team1.map((n) => (
                    <div key={n} className="text-sm" style={{ color: C.text }}>
                      {n}
                    </div>
                  ))}
                </div>
                <div className="rounded-2xl p-3" style={{ background: C.surface2 }}>
                  <div className="text-[10px] uppercase tracking-wide mb-1" style={{ color: C.pink }}>
                    {settings.team2Name} · avg {avgHandicap(aiTeams.team2)}
                  </div>
                  {aiTeams.team2.map((n) => (
                    <div key={n} className="text-sm" style={{ color: C.text }}>
                      {n}
                    </div>
                  ))}
                </div>
              </div>
              {aiTeams.explanation && (
                <p className="text-xs mb-3 italic" style={{ color: C.muted }}>
                  "{aiTeams.explanation}"
                </p>
              )}
              <div className="flex gap-2">
                <GhostButton onClick={() => setAiTeams(null)} style={{ flex: 1, textAlign: 'center' }}>
                  Dismiss
                </GhostButton>
                <PrimaryButton onClick={applyAiTeams} style={{ flex: 1, textAlign: 'center' }}>
                  Apply Teams
                </PrimaryButton>
              </div>
            </div>
          )}
        </Collapse>
      </Card>
    </div>
  );
}

// ---------- Live scoring ----------
function WolfPicker({ players, holeIdx, pick, onChange }) {
  const wolfId = pick?.wolf ?? players[holeIdx % players.length]?.id;
  const others = players.filter((p) => p.id !== wolfId);
  return (
    <div className="rounded-2xl p-3 mb-3" style={{ background: C.surface3, border: `1px solid ${C.border}` }}>
      <div className="text-[10px] uppercase tracking-wide mb-2" style={{ color: C.lime }}>
        🐺 Wolf this hole
      </div>
      <div className="flex flex-wrap gap-2 mb-2">
        {players.map((p) => (
          <button
            key={p.id}
            onClick={() => onChange({ wolf: p.id, partner: null, lone: false })}
            className="px-3 py-1.5 rounded-full text-xs font-semibold"
            style={{ background: wolfId === p.id ? C.lime : C.surface2, color: wolfId === p.id ? '#000' : C.muted }}
          >
            {p.name}
          </button>
        ))}
      </div>
      <div className="text-[10px] uppercase tracking-wide mb-2" style={{ color: C.lime }}>
        Partner
      </div>
      <div className="flex flex-wrap gap-2">
        {others.map((p) => (
          <button
            key={p.id}
            onClick={() => onChange({ wolf: wolfId, partner: p.id, lone: false })}
            className="px-3 py-1.5 rounded-full text-xs font-semibold"
            style={{ background: pick?.partner === p.id ? C.lime : C.surface2, color: pick?.partner === p.id ? '#000' : C.muted }}
          >
            {p.name}
          </button>
        ))}
        <button
          onClick={() => onChange({ wolf: wolfId, partner: null, lone: true })}
          className="px-3 py-1.5 rounded-full text-xs font-semibold"
          style={{ background: pick?.lone ? C.pink : C.surface2, color: pick?.lone ? '#000' : C.muted }}
        >
          Go it alone
        </button>
      </div>
    </div>
  );
}
function BBBPicker({ players, pick, onChange }) {
