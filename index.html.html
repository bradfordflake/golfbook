    { key: 'bingo', label: '🟢 Bingo — first on the green' },
    { key: 'bango', label: '🎯 Bango — closest once all on' },
    { key: 'bongo', label: '⛳ Bongo — first in the hole' },
  ];
  return (
    <div className="rounded-2xl p-3 mb-3" style={{ background: C.surface3, border: `1px solid ${C.border}` }}>
      {rows.map((r) => (
        <div key={r.key} className="mb-2 last:mb-0">
          <div className="text-[10px] uppercase tracking-wide mb-1.5" style={{ color: C.muted }}>
            {r.label}
          </div>
          <div className="flex flex-wrap gap-2">
            {players.map((p) => (
              <button
                key={p.id}
                onClick={() => onChange({ ...pick, [r.key]: pick?.[r.key] === p.id ? null : p.id })}
                className="px-3 py-1.5 rounded-full text-xs font-semibold"
                style={{ background: pick?.[r.key] === p.id ? C.lime : C.surface2, color: pick?.[r.key] === p.id ? '#000' : C.muted }}
              >
                {p.name}
              </button>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

function GameScoreboardCard({ settings, round, course, players, patchGameData, readOnly }) {
  const game = GAME_LIBRARY.find((g) => g.id === round.gameId) || null;
  const scoring = game?.scoring || 'quota';
  const holes = roundHoles(round, course);
  const activePlayers = players;

  if (scoring === 'quota') {
    const board = activePlayers
      .map((p) => {
        const res = playerResultInRound(settings, round, p, course);
        const thru = holes.filter((h, i) => round.playerData[p.id]?.holeScores?.[i] != null).length;
        return { p, res, thru };
      })
      .sort((a, b) => (b.res ? b.res.result : -999) - (a.res ? a.res.result : -999));
    return (
      <Card>
        <div className="font-display text-lg mb-2" style={{ color: C.text }}>
          {readOnly ? 'Final Standings' : 'Live Standings'}
        </div>
        {board.map(({ p, res, thru }, i) => (
          <div key={p.id} className="flex items-center justify-between py-2" style={{ borderBottom: `1px solid ${C.border}` }}>
            <div className="flex items-center gap-2 min-w-0">
              <span className="font-display text-xs w-4" style={{ color: i === 0 && res ? C.gold : C.faint }}>
                {i + 1}
              </span>
              <span className="text-sm truncate" style={{ color: i === 0 && res ? C.text : C.muted, fontWeight: i === 0 && res ? 700 : 500 }}>
                {p.name}
              </span>
            </div>
            <div className="flex items-center gap-2 shrink-0">
              <span className="text-[10px]" style={{ color: C.faint }}>
                {res ? `${res.points} pts · q${res.quota} · thru ${thru}` : 'no scores'}
              </span>
              <span className="font-display text-base w-10 text-right" style={{ color: res ? (res.result >= 0 ? C.lime : C.red) : C.faint }}>
                {res ? (res.result >= 0 ? '+' : '') + res.result : '–'}
              </span>
            </div>
          </div>
        ))}
      </Card>
    );
  }

  if (scoring === 'stroke') {
    const rows = strokePlayBoard(round, course, activePlayers);
    return (
      <Card>
        <div className="font-display text-lg mb-2" style={{ color: C.text }}>
          {game.name} — Total Strokes
        </div>
        {rows.map(({ p, total, thru }, i) => (
          <BoardRow key={p.id} rank={i + 1} name={p.name} value={thru > 0 ? total : '–'} sub={`thru ${thru}`} />
        ))}
      </Card>
    );
  }

  if (scoring === 'stableford') {
    const rows = stablefordBoard(round, course, activePlayers);
    return (
      <Card>
        <div className="font-display text-lg mb-2" style={{ color: C.text }}>
          {game.name}
        </div>
        {rows.map(({ p, total, thru }, i) => (
          <BoardRow key={p.id} rank={i + 1} name={p.name} value={thru > 0 ? total : '–'} sub={`thru ${thru}`} />
        ))}
      </Card>
    );
  }

  if (scoring === 'match') {
    if (activePlayers.length !== 2) {
      return <EmptyNote text={`${game.name} needs exactly 2 players selected for this round.`} />;
    }
    const seg = matchSegment(round, course, activePlayers, 0, holes.length);
    return (
      <Card>
        <div className="font-display text-lg mb-2" style={{ color: C.text }}>
          {game.name}
        </div>
        <div className="flex items-center justify-between py-2">
          <span className="font-display text-lg" style={{ color: seg.diff > 0 ? C.gold : C.text }}>
            {seg.a.name}
          </span>
          <span className="font-display text-xs" style={{ color: C.muted }}>
            {matchLabel(seg)}
          </span>
          <span className="font-display text-lg" style={{ color: seg.diff < 0 ? C.gold : C.text }}>
            {seg.b.name}
          </span>
        </div>
      </Card>
    );
  }

  if (scoring === 'nassau') {
    if (activePlayers.length !== 2) {
      return <EmptyNote text="Nassau needs exactly 2 players selected for this round." />;
    }
    if (holes.length < 18) {
      const seg = matchSegment(round, course, activePlayers, 0, holes.length);
      return (
        <Card>
          <div className="font-display text-lg mb-2" style={{ color: C.text }}>
            Nassau (single match — needs 18 holes for all 3 bets)
          </div>
          <div className="flex items-center justify-between py-2">
            <span className="font-display text-base" style={{ color: seg.diff > 0 ? C.gold : C.text }}>
              {seg.a.name}
            </span>
            <span className="font-display text-xs" style={{ color: C.muted }}>
              {matchLabel(seg)}
            </span>
            <span className="font-display text-base" style={{ color: seg.diff < 0 ? C.gold : C.text }}>
              {seg.b.name}
            </span>
          </div>
        </Card>
      );
    }
    const front = matchSegment(round, course, activePlayers, 0, 9);
    const back = matchSegment(round, course, activePlayers, 9, 18);
    const overall = matchSegment(round, course, activePlayers, 0, 18);
    return (
      <Card>
        <div className="font-display text-lg mb-2" style={{ color: C.text }}>
          Nassau
        </div>
        {[
          ['Front 9', front],
          ['Back 9', back],
          ['Overall', overall],
        ].map(([label, seg]) => (
          <div key={label} className="py-2" style={{ borderBottom: `1px solid ${C.border}` }}>
            <div className="text-[10px] uppercase tracking-wide mb-1" style={{ color: C.muted }}>
              {label}
            </div>
            <div className="flex items-center justify-between">
              <span className="font-display text-sm" style={{ color: seg.diff > 0 ? C.gold : C.text }}>
                {seg.a.name}
              </span>
              <span className="font-display text-xs" style={{ color: C.muted }}>
                {matchLabel(seg)}
              </span>
              <span className="font-display text-sm" style={{ color: seg.diff < 0 ? C.gold : C.text }}>
                {seg.b.name}
              </span>
            </div>
          </div>
        ))}
      </Card>
    );
  }

  if (scoring === 'nines') {
    if (activePlayers.length !== 3) {
      return <EmptyNote text="Nines needs exactly 3 players selected for this round." />;
    }
    const { pts, thru } = ninesBoard(round, course, activePlayers);
    const rows = activePlayers.map((p) => ({ p, pts: pts[p.id] })).sort((a, b) => b.pts - a.pts);
    return (
      <Card>
        <div className="font-display text-lg mb-2" style={{ color: C.text }}>
          Nines (5-3-1)
        </div>
        {rows.map(({ p, pts: v }, i) => (
          <BoardRow key={p.id} rank={i + 1} name={p.name} value={v} sub={`thru ${thru}`} />
        ))}
      </Card>
    );
  }

  if (scoring === 'wolf') {
    const { pts, thru } = wolfBoard(round, course, activePlayers);
    const rows = activePlayers.map((p) => ({ p, pts: pts[p.id] })).sort((a, b) => b.pts - a.pts);
    return (
      <Card>
        <div className="font-display text-lg mb-2" style={{ color: C.text }}>
          Wolf
        </div>
        {rows.map(({ p, pts: v }, i) => (
          <BoardRow key={p.id} rank={i + 1} name={p.name} value={v} sub={`thru ${thru}`} />
        ))}
      </Card>
    );
  }

  if (scoring === 'bbb') {
    const pts = bbbBoard(round, activePlayers);
    const rows = activePlayers.map((p) => ({ p, pts: pts[p.id] })).sort((a, b) => b.pts - a.pts);
    return (
      <Card>
        <div className="font-display text-lg mb-2" style={{ color: C.text }}>
          Bingo Bango Bongo
        </div>
        {rows.map(({ p, pts: v }, i) => (
          <BoardRow key={p.id} rank={i + 1} name={p.name} value={v} />
        ))}
      </Card>
    );
  }

  if (scoring === 'skins') {
    const skinsRound = { ...round, entryMode: 'holebyhole', skinsOptIn: activePlayers.map((p) => p.id) };
    const skins = computeSkinsForRound(skinsRound, activePlayers, course, { ...settings, skinsBuyIn: settings.skinsBuyIn || 5 });
    if (!skins) return <EmptyNote text="Skins needs at least 2 players and a skins buy-in above $0 (set in Settings)." />;
    const rows = skins.players.map((p) => ({ p, count: skins.tally[p.id], pay: skins.payouts[p.id] })).sort((a, b) => b.count - a.count);
    return (
      <Card>
        <div className="flex items-center justify-between mb-2">
          <div className="font-display text-lg" style={{ color: C.text }}>
            Skins
          </div>
          <StatTile label="Pot" value={`$${skins.pot}`} />
        </div>
        {rows.map(({ p, count, pay }) => (
          <div key={p.id} className="flex items-center justify-between py-1.5" style={{ borderBottom: `1px solid ${C.border}` }}>
            <span style={{ color: count > 0 ? C.text : C.muted, fontWeight: count > 0 ? 600 : 400 }}>{p.name}</span>
            <span className="font-display text-sm" style={{ color: count > 0 ? C.gold : C.faint }}>
              {count} skin{count === 1 ? '' : 's'} · ${pay.toFixed(2)}
            </span>
          </div>
        ))}
        {skins.carry > 0 && (
          <div className="text-[11px] mt-2" style={{ color: C.orange }}>
            {skins.carry} skin{skins.carry > 1 ? 's' : ''} still carrying (thru {skins.thru})
          </div>
        )}
      </Card>
    );
  }

  // manual tally — for formats without a dedicated automatic engine
  const tally = round.gameData?.manualTally || {};
  function bumpTally(playerId, delta) {
    patchGameData(round.id, { manualTally: { ...tally, [playerId]: (tally[playerId] || 0) + delta } });
  }
  const rows = activePlayers.map((p) => ({ p, v: tally[p.id] || 0 })).sort((a, b) => b.v - a.v);
  return (
    <Card>
      <div className="font-display text-lg mb-1" style={{ color: C.text }}>
        {game ? `${game.name} — Manual Tally` : 'Manual Tally'}
      </div>
      {!readOnly && (
        <p className="text-xs mb-2" style={{ color: C.muted }}>
          No automatic engine for this format yet — tap +/− to track it by hand as you play. Check "Rules" above for how to score it.
        </p>
      )}
      {rows.map(({ p, v }) => (
        <div key={p.id} className="flex items-center justify-between py-1.5" style={{ borderBottom: `1px solid ${C.border}` }}>
          <span className="text-sm" style={{ color: C.text }}>
            {p.name}
          </span>
          {readOnly ? (
            <span className="font-display text-base" style={{ color: C.text }}>
              {v}
            </span>
          ) : (
            <div className="flex items-center gap-3">
              <button onClick={() => bumpTally(p.id, -1)} className="w-7 h-7 rounded-full flex items-center justify-center" style={{ background: C.surface2, color: C.text }}>
                <Minus size={12} />
              </button>
              <span className="w-8 text-center font-display text-base" style={{ color: C.text }}>
                {v}
              </span>
              <button onClick={() => bumpTally(p.id, 1)} className="w-7 h-7 rounded-full flex items-center justify-center" style={{ background: C.lime, color: '#000' }}>
                <Plus size={12} />
              </button>
            </div>
          )}
        </div>
      ))}
    </Card>
  );
}

function LiveScoring({ settings, round, players, course, patchRound, setHoleScore, patchGameData, onBackToSetup, onFinish }) {
  const holes = roundHoles(round, course);
  const activePlayers = roundPlayerList(round, players);
  const holeIdx = Math.min(round.currentHole || 0, holes.length - 1);
  const hole = holes[holeIdx];
  const net = round.pointsBasis === 'net';
  const [showRules, setShowRules] = useState(false);

  // Default every player to par as soon as a hole is opened, so a par round takes zero taps.
  useEffect(() => {
    activePlayers.forEach((p) => {
      if (round.playerData[p.id]?.holeScores?.[holeIdx] == null) {
        setHoleScore(round.id, p.id, holeIdx, hole.par);
      }
    });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [holeIdx, round.id]);

  function setHole(i) {
    patchRound(round.id, { currentHole: i });
  }
  function bump(playerId, delta) {
    const cur = round.playerData[playerId]?.holeScores?.[holeIdx];
    const base = cur == null ? hole.par : cur;
    setHoleScore(round.id, playerId, holeIdx, Math.max(1, base + delta));
  }
  function resetToPar(playerId) {
    setHoleScore(round.id, playerId, holeIdx, hole.par);
  }

  const allScoredThisHole = activePlayers.length > 0 && activePlayers.every((p) => round.playerData[p.id]?.holeScores?.[holeIdx] != null);

  const game = GAME_LIBRARY.find((g) => g.id === round.gameId) || null;
  const showDogfightInfo = !game || game.scoring === 'quota';

  return (
    <div>
      <div className="flex items-center justify-between mb-3">
        <button onClick={onBackToSetup} className="text-sm font-semibold" style={{ color: C.lime }}>
          ← Round setup
        </button>
        {round.casual && (
          <span className="px-2 py-0.5 rounded-full text-[10px] font-bold" style={{ background: C.surface2, color: C.cyan, border: `1px solid ${C.cyan}` }}>
            CASUAL · not counted
          </span>
        )}
        {showDogfightInfo && (
          <div className="flex items-center gap-2">
            <span className="text-[10px] uppercase" style={{ color: C.muted }}>
              Points
            </span>
            <div className="flex rounded-full p-0.5" style={{ background: C.surface2 }}>
              {['gross', 'net'].map((v) => (
                <button
                  key={v}
                  onClick={() => patchRound(round.id, { pointsBasis: v })}
                  className="px-3 py-1 rounded-full text-[11px] font-bold uppercase"
                  style={{ background: (round.pointsBasis || 'gross') === v ? C.lime : 'transparent', color: (round.pointsBasis || 'gross') === v ? '#000' : C.muted }}
                >
                  {v}
                </button>
              ))}
            </div>
          </div>
        )}
      </div>

      {game && (
        <div className="mb-3">
          <button
            onClick={() => setShowRules((v) => !v)}
            className="w-full flex items-center justify-between rounded-2xl px-3 py-2.5 tap"
            style={{ background: '#12140A', border: `1.5px solid ${C.lime}` }}
          >
            <div className="flex items-center gap-2 min-w-0">
              <span className="text-lg">🎯</span>
              <span className="font-display text-base truncate" style={{ color: C.text }}>
                Playing: {game.name}
              </span>
            </div>
            <span className="flex items-center gap-1 text-xs font-semibold shrink-0" style={{ color: C.lime }}>
              Rules
              <ChevronDown size={14} style={{ transform: showRules ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform 0.25s ease' }} />
            </span>
          </button>
          <Collapse open={showRules}>
            <div className="rounded-2xl p-3 mt-1" style={{ background: C.surface, border: `1px solid ${C.border}` }}>
              <div className="text-[10px] uppercase tracking-wide mb-1" style={{ color: C.lime }}>
                How to play
              </div>
              <p className="text-xs leading-relaxed mb-2" style={{ color: C.text }}>
                {game.rules}
              </p>
              <div className="text-[10px] uppercase tracking-wide mb-1" style={{ color: C.gold }}>
                The bet
              </div>
              <p className="text-xs leading-relaxed" style={{ color: C.muted }}>
                {game.bet}
              </p>
            </div>
          </Collapse>
        </div>
      )}

      {/* hole strip */}
      <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
        {holes.map((h, i) => {
          const done = activePlayers.length > 0 && activePlayers.every((p) => round.playerData[p.id]?.holeScores?.[i] != null);
          return (
            <button
              key={i}
              onClick={() => setHole(i)}
              className="shrink-0 w-9 h-9 rounded-full flex items-center justify-center font-display text-sm tap"
              style={{
                background: i === holeIdx ? C.lime : done ? C.surface3 : C.surface2,
                color: i === holeIdx ? '#000' : done ? C.lime : C.muted,
                border: done && i !== holeIdx ? `1px solid ${C.lime}` : '1px solid transparent',
                transform: i === holeIdx ? 'scale(1.1)' : 'scale(1)',
                transition: 'transform 0.2s cubic-bezier(0.34,1.56,0.64,1), background-color 0.2s ease, color 0.2s ease',
              }}
            >
              {i + 1}
            </button>
          );
        })}
      </div>

      {/* hole header */}
      <div key={holeIdx} className="tab-fade-in">
        <div className="text-center py-3">
          <div className="font-display text-3xl leading-none" style={{ color: C.text }}>
            HOLE {holeIdx + 1}
          </div>
          <div className="font-display text-xs mt-1" style={{ color: C.muted }}>
            PAR {hole.par} · STROKE INDEX {hole.si}
          </div>
        </div>

        {game?.scoring === 'wolf' && (
          <WolfPicker
            players={activePlayers}
            holeIdx={holeIdx}
            pick={round.gameData?.wolfPicks?.[holeIdx]}
            onChange={(patch) => patchGameData(round.id, { wolfPicks: { ...(round.gameData?.wolfPicks || {}), [holeIdx]: patch } })}
          />
        )}
        {game?.scoring === 'bbb' && (
          <BBBPicker
            players={activePlayers}
            pick={round.gameData?.bbbPicks?.[holeIdx]}
            onChange={(patch) => patchGameData(round.id, { bbbPicks: { ...(round.gameData?.bbbPicks || {}), [holeIdx]: patch } })}
          />
        )}

        {/* score rows */}
        {activePlayers.map((p) => {
          const strokes = strokesThisHole(round, p, course, holeIdx);
          const gross = round.playerData[p.id]?.holeScores?.[holeIdx];
          const eff = gross != null ? (net ? gross - strokes : gross) : null;
          const pts = eff != null ? stablefordPoints(eff, hole.par) : null;
          return (
            <div key={p.id} className="rounded-2xl p-3 mb-2" style={{ background: C.surface, border: `1px solid ${C.border}` }}>
              <div className="flex items-center justify-between">
                <div className="min-w-0 flex-1">
                  <div className="flex items-center gap-1.5">
                    <span className="font-medium text-sm truncate" style={{ color: C.text }}>
                      {p.name}
                    </span>
                    {strokes > 0 && (
                      <span className="shrink-0 px-1.5 py-0.5 rounded-full text-[10px] font-bold check-pop" style={{ background: 'rgba(180,255,57,0.15)', color: C.lime }}>
                        {'●'.repeat(Math.min(strokes, 3))} {strokes > 1 ? `+${strokes}` : 'stroke'}
                      </span>
                    )}
                  </div>
                  <div className="text-[10px] mt-0.5" style={{ color: C.faint }}>
                    {showDogfightInfo
                      ? pts != null
                        ? `${pts} pt${pts === 1 ? '' : 's'} this hole${net && strokes > 0 ? ` (net ${eff})` : ''}`
                        : strokes > 0
                        ? `Gets ${strokes} stroke${strokes > 1 ? 's' : ''} here`
                        : 'No stroke this hole'
                      : strokes > 0
                      ? `Gets ${strokes} stroke${strokes > 1 ? 's' : ''} here`
                      : 'No stroke this hole'}
                  </div>
                </div>
                <div className="flex items-center gap-3 shrink-0">
                  <button onClick={() => bump(p.id, -1)} className="w-9 h-9 rounded-full flex items-center justify-center tap" style={{ background: C.surface2, color: C.text }}>
                    <Minus size={15} />
                  </button>
                  <button onClick={() => resetToPar(p.id)} className="w-8 text-center font-display text-xl" style={{ color: gross != null ? C.text : C.faint }}>
                    <span key={gross ?? 'par'} className="inline-block pop-in">
                      {gross ?? hole.par}
                    </span>
                  </button>
                  <button onClick={() => bump(p.id, 1)} className="w-9 h-9 rounded-full flex items-center justify-center tap" style={{ background: C.lime, color: '#000' }}>
                    <Plus size={15} />
                  </button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      <div className="text-[10px] text-center mb-3" style={{ color: C.faint }}>
        Defaults to par — tap +/− to adjust, tap the score to reset it
      </div>

      {/* prev / next */}
      <div className="flex gap-2 mb-4">
        <GhostButton onClick={() => setHole(Math.max(0, holeIdx - 1))} style={{ flex: 1, textAlign: 'center', opacity: holeIdx === 0 ? 0.4 : 1 }}>
          ← Hole {Math.max(1, holeIdx)}
        </GhostButton>
        {holeIdx < holes.length - 1 ? (
          <PrimaryButton onClick={() => setHole(holeIdx + 1)} style={{ flex: 1, textAlign: 'center', opacity: allScoredThisHole ? 1 : 0.85 }}>
            Hole {holeIdx + 2} →
          </PrimaryButton>
        ) : (
          <PrimaryButton onClick={onFinish} style={{ flex: 1, textAlign: 'center' }}>
            Finish round ✓
          </PrimaryButton>
        )}
      </div>

      {/* live scoreboard, tailored to the selected game */}
      <GameScoreboardCard settings={settings} round={round} course={course} players={activePlayers} patchGameData={patchGameData} />

      <GhostButton onClick={onFinish} style={{ width: '100%', textAlign: 'center', marginBottom: 24 }}>
        End live scoring
      </GhostButton>
    </div>
  );
}

// ---------- Round Summary (shown after Finish round) ----------
function HoleByHoleRecap({ round, course, players }) {
  const holes = roundHoles(round, course);
  return (
    <Card>
      <div className="font-display text-lg mb-2" style={{ color: C.text }}>
        Scorecard
      </div>
      <div style={{ overflowX: 'auto' }}>
        <div style={{ display: 'grid', gridTemplateColumns: `100px repeat(${holes.length}, 32px)`, minWidth: 100 + holes.length * 32 }}>
          <div style={{ position: 'sticky', left: 0, background: C.surface }} className="text-[9px] uppercase py-1">
            <span style={{ color: C.muted }}>Hole</span>
          </div>
          {holes.map((h, i) => (
            <div key={i} className="text-[10px] text-center py-1 font-display" style={{ color: C.text }}>
              {i + 1}
            </div>
          ))}
          <div style={{ position: 'sticky', left: 0, background: C.surface }} className="text-[9px] py-1">
            <span style={{ color: C.muted }}>Par</span>
          </div>
          {holes.map((h, i) => (
            <div key={i} className="text-[10px] text-center py-1" style={{ color: C.muted }}>
              {h.par}
            </div>
          ))}
          <div style={{ position: 'sticky', left: 0, background: C.surface }} className="text-[9px] py-1 mb-1">
            <span style={{ color: C.muted }}>SI</span>
          </div>
          {holes.map((h, i) => (
            <div key={i} className="text-[10px] text-center py-1 mb-1" style={{ color: C.faint, borderBottom: `1px solid ${C.border}` }}>
              {h.si}
            </div>
          ))}
          {players.map((p) => (
            <React.Fragment key={p.id}>
              <div style={{ position: 'sticky', left: 0, background: C.surface }} className="text-[11px] py-1 truncate pr-1" title={p.name}>
                <span style={{ color: C.text }}>{p.name}</span>
              </div>
              {holes.map((h, i) => {
                const g = round.playerData[p.id]?.holeScores?.[i];
                return (
                  <div key={i} className="text-[11px] text-center py-1 font-display" style={{ color: scoreColor(g, h.par) }}>
                    {g ?? '–'}
                  </div>
                );
              })}
            </React.Fragment>
          ))}
        </div>
      </div>
      <div className="text-[10px] mt-2" style={{ color: C.faint }}>
        <span style={{ color: C.gold }}>●</span> eagle+ &nbsp; <span style={{ color: C.lime }}>●</span> birdie &nbsp; <span style={{ color: C.text }}>●</span> par &nbsp;{' '}
        <span style={{ color: C.orange }}>●</span> bogey &nbsp; <span style={{ color: C.red }}>●</span> double+
      </div>
    </Card>
  );
}

function RoundSummary({ round, course, players, courses, rounds, settings, onDone, onReopen }) {
  const activePlayers = roundPlayerList(round, players);
  const game = GAME_LIBRARY.find((g) => g.id === round.gameId) || null;
  const holes = roundHoles(round, course);

  const scoreRows = activePlayers
    .map((p) => {
      let total = 0,
        thru = 0;
      holes.forEach((h, i) => {
        const g = round.playerData[p.id]?.holeScores?.[i];
        if (g != null) {
          total += g;
          thru++;
        }
      });
      return { p, total, thru, toPar: total - holes.slice(0, thru).reduce((s, h) => s + h.par, 0) };
    })
    .sort((a, b) => (a.thru === 0 ? 1 : b.thru === 0 ? -1 : a.total - b.total));

  const purse = !round.casual ? purseForRound(settings, round, activePlayers, course) : null;
  const skinsRound = round.entryMode === 'holebyhole' ? { ...round } : null;
  const skins = skinsRound ? computeSkinsForRound(skinsRound, activePlayers, course, settings) : null;
  const hasMoney = (purse && purse.scoredCount > 0) || (skins && skins.pot > 0);

  let impact = null;
  if (!round.casual) {
    const leagueRounds = rounds.filter((r) => !r.casual);
    const events = getEvents(leagueRounds);
    const event = events.find((e) => e.roundIds.includes(round.id));
    if (event) {
      const { pointsMap, ranked } = computeEventRanking(settings, event, leagueRounds, courses, players);
      const season = computeSeason(settings, leagueRounds, courses, players);
      const leaderboard = [...players].sort((a, b) => (season.seasonTotals[b.id] || 0) - (season.seasonTotals[a.id] || 0));
      impact = { pointsMap, ranked, season, leaderboard };
    }
  }

  return (
    <div>
      <div className="text-center py-3 fade-in" style={{ position: 'relative' }}>
        <div className="font-display text-3xl leading-none pop-in" style={{ color: C.lime, textShadow: '0 0 14px rgba(180,255,57,0.4)' }}>
          ROUND COMPLETE
        </div>
        <div className="text-xs mt-1" style={{ color: C.muted }}>
          {round.date} · {course?.name} · {round.holes}-hole{round.casual ? ' · Casual' : ''}
          {game ? ` · ${game.name}` : ''}
        </div>
        {['⛳', '🏆', '✨', '🎉'].map((e, i) => (
          <span
            key={i}
            className="float-particle text-lg"
            style={{ left: `${20 + i * 20}%`, top: '10px', animationDelay: `${i * 0.12}s` }}
          >
            {e}
          </span>
        ))}
      </div>

      <div className="tab-fade-in" style={{ animationDelay: '0.08s' }}>
        <GameScoreboardCard settings={settings} round={round} course={course} players={activePlayers} readOnly />
      </div>

      <div className="tab-fade-in" style={{ animationDelay: '0.16s' }}>
        <Card>
          <div className="font-display text-lg mb-2" style={{ color: C.text }}>
            Total Score
          </div>
          {scoreRows.map(({ p, total, thru, toPar }, i) => (
            <BoardRow
              key={p.id}
              rank={i + 1}
              name={p.name}
              value={thru > 0 ? total : '–'}
              sub={thru > 0 ? `${toPar === 0 ? 'E' : toPar > 0 ? `+${toPar}` : toPar} · thru ${thru}` : 'no scores'}
            />
          ))}
        </Card>
      </div>

      <div className="tab-fade-in" style={{ animationDelay: '0.24s' }}>
        {round.entryMode === 'holebyhole' ? (
          <HoleByHoleRecap round={round} course={course} players={activePlayers} />
        ) : (
          <EmptyNote text="This round was scored by total points, not hole-by-hole, so there's no scorecard to show." />
        )}
      </div>

      {hasMoney && (
        <div className="tab-fade-in" style={{ animationDelay: '0.32s' }}>
        <Card>
          <div className="font-display text-lg mb-2" style={{ color: C.text }}>
            Money Won
          </div>
          {purse && purse.scoredCount > 0 && (
            <div className="mb-3">
              <div className="text-[10px] uppercase tracking-wide mb-1" style={{ color: C.muted }}>
                Weekly purse — pot ${purse.pot} (${purse.rake} to season pool)
              </div>
              {purse.ranked.map((r, i) => {
                const p = players.find((pp) => pp.id === r.id);
                const pay = purse.payouts[r.id] || 0;
                return <BoardRow key={r.id} rank={i + 1} name={p?.name || '?'} value={pay > 0 ? `$${pay}` : '—'} sub={`${r.result >= 0 ? '+' : ''}${r.result}`} />;
              })}
            </div>
          )}
          {skins && skins.pot > 0 && (
            <div>
              <div className="text-[10px] uppercase tracking-wide mb-1" style={{ color: C.muted }}>
                Skins — pot ${skins.pot}
              </div>
              {skins.players
                .map((p) => ({ p, count: skins.tally[p.id], pay: skins.payouts[p.id] }))
                .sort((a, b) => b.count - a.count)
                .map(({ p, count, pay }) => (
                  <div key={p.id} className="flex items-center justify-between py-1.5" style={{ borderBottom: `1px solid ${C.border}` }}>
                    <span style={{ color: count > 0 ? C.text : C.muted, fontWeight: count > 0 ? 600 : 400 }}>{p.name}</span>
                    <span className="font-display text-sm" style={{ color: count > 0 ? C.gold : C.faint }}>
                      {count} skin{count === 1 ? '' : 's'} · ${pay.toFixed(2)}
                    </span>
                  </div>
                ))}
            </div>
          )}
        </Card>
        </div>
      )}

      {impact && (
        <div className="tab-fade-in" style={{ animationDelay: '0.4s' }}>
        <Card>
          <div className="font-display text-lg mb-1" style={{ color: C.text }}>
            Dogfight League Impact
          </div>
          <p className="text-xs mb-2" style={{ color: C.muted }}>
            Season points earned this round, and each player's updated season standing.
          </p>
          {impact.ranked.map((x, i) => {
            const p = players.find((pp) => pp.id === x.id);
            const earned = impact.pointsMap[x.id];
            const total = impact.season.seasonTotals[x.id];
            const rank = impact.leaderboard.findIndex((pp) => pp.id === x.id) + 1;
            return (
              <div key={x.id} className="flex items-center justify-between py-2 row-in" style={{ borderBottom: `1px solid ${C.border}`, animationDelay: `${0.4 + Math.min(i, 10) * 0.04}s` }}>
                <div className="flex items-center gap-2 min-w-0">
                  <span className="font-display text-xs w-4" style={{ color: i === 0 ? C.gold : C.faint }}>
                    {i + 1}
                  </span>
                  <span className="text-sm truncate" style={{ color: C.text }}>
                    {p?.name || '?'}
                  </span>
                </div>
                <div className="text-right shrink-0">
                  <div className="font-display text-sm" style={{ color: C.lime }}>
                    +{earned} pts
                  </div>
                  <div className="text-[10px]" style={{ color: C.faint }}>
                    {total} total · #{rank} of {players.length}
                  </div>
                </div>
              </div>
            );
          })}
        </Card>
        </div>
      )}

      <PrimaryButton onClick={onDone} style={{ width: '100%', textAlign: 'center', marginBottom: 8 }}>
        Done
      </PrimaryButton>
      <GhostButton onClick={onReopen} style={{ width: '100%', textAlign: 'center', marginBottom: 24 }}>
        Reopen this round
      </GhostButton>
    </div>
  );
}

// ---------- Rounds & Scores tab ----------
function RoundsTab({ settings, players, courses, rounds, setRounds, editingRoundId, setEditingRoundId }) {
  const [showCasual, setShowCasual] = useState(false);
  const [selectMode, setSelectMode] = useState(false);
  const [selectedRoundIds, setSelectedRoundIds] = useState([]);
  function toggleSelectRound(id) {
    setSelectedRoundIds((ids) => (ids.includes(id) ? ids.filter((x) => x !== id) : [...ids, id]));
  }
  const [confirmDeleteIds, setConfirmDeleteIds] = useState(null);
  function performDelete() {
    if (!confirmDeleteIds || confirmDeleteIds.length === 0) return;
    deleteRounds(confirmDeleteIds);
    if (confirmDeleteIds.includes(editingRoundId)) setEditingRoundId(null);
    setSelectedRoundIds((ids) => ids.filter((id) => !confirmDeleteIds.includes(id)));
    setSelectMode(false);
    setConfirmDeleteIds(null);
  }
  function newRound() {
    const course = courses[0];
    const r = {
      id: uid(),
      date: new Date().toISOString().slice(0, 10),
      courseId: course.id,
      teeName: course.tees[0].name,
      holes: 18,
      entryMode: 'points',
      combinedWith: null,
      playerIds: [],
      skinsOptIn: [],
      playerData: {},
      status: 'setup',
      currentHole: 0,
      pointsBasis: 'gross',
      gameId: null,
      gameData: {},
    };
    setRounds((rs) => [r, ...rs]);
    setEditingRoundId(r.id);
  }
  function deleteRounds(ids) {
    setRounds((rs) => rs.filter((r) => !ids.includes(r.id)).map((r) => (ids.includes(r.combinedWith) ? { ...r, combinedWith: null } : r)));
  }
  function patchRound(id, patch) {
    setRounds((rs) => rs.map((r) => (r.id === id ? { ...r, ...patch } : r)));
  }
  function togglePlayerInRound(roundId, playerId) {
    setRounds((rs) =>
      rs.map((r) => {
        if (r.id !== roundId) return r;
        const current = Array.isArray(r.playerIds) ? r.playerIds : players.map((p) => p.id);
        const set = new Set(current);
        if (set.has(playerId)) set.delete(playerId);
        else set.add(playerId);
        return { ...r, playerIds: Array.from(set) };
      })
    );
  }
  function setRoundPlayerIds(roundId, ids) {
    patchRound(roundId, { playerIds: ids });
  }
  function patchPlayerData(roundId, playerId, patch) {
    setRounds((rs) =>
      rs.map((r) => {
        if (r.id !== roundId) return r;
        const pd = { ...(r.playerData[playerId] || {}), ...patch };
        return { ...r, playerData: { ...r.playerData, [playerId]: pd } };
      })
    );
  }
  function setHoleScore(roundId, playerId, holeIdx, val) {
    setRounds((rs) =>
      rs.map((r) => {
        if (r.id !== roundId) return r;
        const pd = r.playerData[playerId] || {};
        const holeScores = { ...(pd.holeScores || {}), [holeIdx]: val };
        return { ...r, playerData: { ...r.playerData, [playerId]: { ...pd, holeScores } } };
      })
    );
  }
  function toggleSkinsOptIn(roundId, playerId) {
    setRounds((rs) =>
      rs.map((r) => {
        if (r.id !== roundId) return r;
        const set = new Set(r.skinsOptIn || []);
        if (set.has(playerId)) set.delete(playerId);
        else set.add(playerId);
        return { ...r, skinsOptIn: Array.from(set) };
      })
    );
  }
  function patchGameData(roundId, patch) {
    setRounds((rs) => rs.map((r) => (r.id === roundId ? { ...r, gameData: { ...(r.gameData || {}), ...patch } } : r)));
  }

  const editing = rounds.find((r) => r.id === editingRoundId);

  if (editing && editing.status === 'live') {
    const course = courses.find((c) => c.id === editing.courseId) || courses[0];
    return (
      <LiveScoring
        settings={settings}
        round={editing}
        players={players}
        course={course}
        patchRound={patchRound}
        setHoleScore={setHoleScore}
        patchGameData={patchGameData}
        onBackToSetup={() => patchRound(editing.id, { status: 'setup' })}
        onFinish={() => {
          patchRound(editing.id, { status: 'final' });
        }}
      />
    );
  }

  if (editing && editing.status === 'final') {
    const course = courses.find((c) => c.id === editing.courseId) || courses[0];
    return (
      <RoundSummary
        round={editing}
        course={course}
        players={players}
        courses={courses}
        rounds={rounds}
        settings={settings}
        onDone={() => setEditingRoundId(null)}
        onReopen={() => patchRound(editing.id, { status: 'live' })}
      />
    );
  }

  if (editing) {
    const course = courses.find((c) => c.id === editing.courseId) || courses[0];
    const tee = getTee(course, editing.teeName);
    const holes = roundHoles(editing, course);
    const otherNines = rounds.filter((r) => r.id !== editing.id && r.holes === 9 && (!r.combinedWith || r.combinedWith === editing.id));
    const activePlayers = roundPlayerList(editing, players);
    const selectedIds = Array.isArray(editing.playerIds) ? editing.playerIds : players.map((p) => p.id);
    const scoredCount = activePlayers.filter((p) => playerPointsInRound(editing, p, course) != null).length;

    return (
      <div>
        <button onClick={() => setEditingRoundId(null)} className="text-sm font-semibold mb-3" style={{ color: C.lime }}>
          ← Rounds
        </button>

        {editing.casual && (
          <InfoNote>
            <b style={{ color: C.cyan }}>Casual round</b> — from Game Finder. Scoring and skins work the same, but this round is excluded from the Dogfight League season standings, purse, and money-in-play.
          </InfoNote>
        )}

        <Card>
          <div className="grid grid-cols-2 gap-2 mb-2">
            <TextField label="Date" type="date" value={editing.date} onChange={(v) => patchRound(editing.id, { date: v })} />
            <SelectField
              label="Course"
              value={editing.courseId}
              onChange={(v) => {
                const c = courses.find((x) => x.id === v);
                patchRound(editing.id, { courseId: v, teeName: c.tees[0].name });
              }}
              options={courses.map((c) => ({ value: c.id, label: c.name }))}
            />
          </div>
          <div className="grid grid-cols-2 gap-2 mb-2">
            <SelectField
              label="Tees"
              value={editing.teeName}
              onChange={(v) => patchRound(editing.id, { teeName: v })}
              options={course.tees.map((t) => ({ value: t.name, label: `${t.name} ${t.rating}/${t.slope}` }))}
            />
            <div>
              <div className="text-[10px] uppercase tracking-wide mb-1" style={{ color: C.muted }}>
                Holes
              </div>
              <Toggle2
                value={editing.holes}
                onChange={(v) => patchRound(editing.id, { holes: v, combinedWith: v === 18 ? null : editing.combinedWith })}
                options={[{ value: 18, label: '18' }, { value: 9, label: '9' }]}
              />
            </div>
          </div>
          <div className="mb-2">
            <div className="text-[10px] uppercase tracking-wide mb-1" style={{ color: C.muted }}>
              Entry mode
            </div>
            <Toggle2
              value={editing.entryMode}
              onChange={(v) => patchRound(editing.id, { entryMode: v })}
              options={[{ value: 'points', label: 'Points' }, { value: 'holebyhole', label: 'Hole-by-hole' }]}
            />
          </div>
          {editing.holes === 9 && (
            <SelectField
              label="Combine with"
              value={editing.combinedWith || ''}
              onChange={(v) => {
                patchRound(editing.id, { combinedWith: v || null });
                if (v) patchRound(v, { combinedWith: editing.id });
              }}
              options={[{ value: '', label: 'None' }, ...otherNines.map((r) => ({ value: r.id, label: `${r.date} · ${courses.find((c) => c.id === r.courseId)?.name || ''}` }))]}
            />
          )}

          <InfoNote>
            Quota = {settings.quotaBase} − Course Handicap (Index adjusted for the {tee.name} tee, {tee.rating}/{tee.slope}) — auto-calculated from each player's handicap and the selected tee, recalculated when you change the tee. Editable per round. Hole-by-hole gross scores feed the skins game.
          </InfoNote>
          <InfoNote>
            {course.name} · <b style={{ color: C.text }}>{tee.name}</b> tee · rating {tee.rating} / slope {tee.slope} · par {courseParTotal(course, editing.holes)}. Pars & stroke index show on the hole grid below.
          </InfoNote>
        </Card>

        <Card>
          <div className="flex items-center justify-between mb-2">
            <div className="font-display text-sm" style={{ color: C.lime }}>
              SELECT PLAYERS — {selectedIds.length} OF {players.length}
            </div>
            <div className="flex gap-2">
              <button onClick={() => setRoundPlayerIds(editing.id, players.map((p) => p.id))} className="text-xs font-semibold" style={{ color: C.lime }}>
                All
              </button>
              <button onClick={() => setRoundPlayerIds(editing.id, [])} className="text-xs font-semibold" style={{ color: C.muted }}>
                Clear
              </button>
            </div>
          </div>
          <div className="grid grid-cols-2 gap-2">
            {players.map((p) => (
              <button
                key={p.id}
                onClick={() => togglePlayerInRound(editing.id, p.id)}
                className="flex items-center gap-2 rounded-xl px-3 py-2 text-left tap"
                style={{ background: C.surface2 }}
              >
                <span
                  key={selectedIds.includes(p.id) ? 'on' : 'off'}
                  className="w-4 h-4 rounded shrink-0 check-pop"
                  style={{ background: selectedIds.includes(p.id) ? C.lime : 'transparent', border: `1.5px solid ${selectedIds.includes(p.id) ? C.lime : C.faint}`, transition: 'background-color 0.15s ease, border-color 0.15s ease' }}
                />
                <span className="text-sm truncate" style={{ color: C.text }}>
                  {p.name}
                </span>
              </button>
            ))}
            {players.length === 0 && (
              <div className="text-sm col-span-2" style={{ color: C.muted }}>
                No players in the league yet — add some in the Players tab.
              </div>
            )}
          </div>
        </Card>

        {editing.entryMode === 'holebyhole' && settings.skinsBuyIn > 0 && activePlayers.length > 0 && (
          <Card>
            <div className="font-display text-sm mb-2" style={{ color: C.lime }}>
              SKINS OPT-IN — ${settings.skinsBuyIn} EACH · {(editing.skinsOptIn || []).length} IN · ${settings.skinsBuyIn * (editing.skinsOptIn || []).length} POT
            </div>
            <div className="grid grid-cols-2 gap-2">
              {activePlayers.map((p) => (
                <button
                  key={p.id}
                  onClick={() => toggleSkinsOptIn(editing.id, p.id)}
                  className="flex items-center gap-2 rounded-xl px-3 py-2 text-left tap"
                  style={{ background: C.surface2 }}
                >
                  <span
                    key={(editing.skinsOptIn || []).includes(p.id) ? 'on' : 'off'}
                    className="w-4 h-4 rounded shrink-0 check-pop"
                    style={{
                      background: (editing.skinsOptIn || []).includes(p.id) ? C.lime : 'transparent',
                      border: `1.5px solid ${(editing.skinsOptIn || []).includes(p.id) ? C.lime : C.faint}`,
                      transition: 'background-color 0.15s ease, border-color 0.15s ease',
                    }}
                  />
                  <span className="text-sm truncate" style={{ color: C.text }}>
                    {p.name}
                  </span>
                </button>
              ))}
            </div>
          </Card>
        )}

        <Card>
          <div className="font-display text-lg mb-2" style={{ color: C.text }}>
            Scores — {scoredCount}/{activePlayers.length} entered
          </div>
          {activePlayers.length === 0 && (
            <p className="text-sm" style={{ color: C.muted }}>
              Select who's playing above to start entering scores.
            </p>
          )}
          {activePlayers.map((p) => {
            const res = playerResultInRound(settings, editing, p, course);
            const quota = playerQuotaInRound(settings, editing, p, course);
            return (
              <div key={p.id} className="flex items-center justify-between py-2" style={{ borderBottom: `1px solid ${C.border}` }}>
                <span className="text-sm truncate flex-1" style={{ color: C.text }}>
                  {p.name}
                </span>
                <div className="flex items-center gap-3 shrink-0">
                  <div className="text-center">
                    <div className="text-[9px] uppercase" style={{ color: C.faint }}>
                      Quota
                    </div>
                    <input
                      type="number"
                      className="w-12 text-center text-sm rounded-lg px-1 py-0.5 outline-none"
                      style={{ background: C.surface2, color: C.muted }}
                      value={editing.playerData[p.id]?.quotaOverride ?? quota}
                      onChange={(e) => patchPlayerData(editing.id, p.id, { quotaOverride: e.target.value === '' ? null : Number(e.target.value) })}
                    />
                  </div>
                  <div className="text-center">
                    <div className="text-[9px] uppercase" style={{ color: C.faint }}>
                      Points
                    </div>
                    {editing.entryMode === 'points' ? (
                      <input
                        type="number"
                        className="w-14 text-center text-sm rounded-lg px-1 py-0.5 outline-none"
                        style={{ background: C.surface2, color: C.text }}
                        value={editing.playerData[p.id]?.points ?? ''}
                        onChange={(e) => patchPlayerData(editing.id, p.id, { points: e.target.value === '' ? null : Number(e.target.value) })}
                      />
                    ) : (
                      <div className="w-14 text-center font-display text-sm" style={{ color: C.text }}>
                        {res ? res.points : '–'}
                      </div>
                    )}
                  </div>
                  <div className="text-center w-12">
                    <div className="text-[9px] uppercase" style={{ color: C.faint }}>
                      +/-
                    </div>
                    <div className="font-display text-sm" style={{ color: res ? (res.result >= 0 ? C.lime : C.red) : C.faint }}>
                      {res ? (res.result >= 0 ? '+' : '') + res.result : '–'}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </Card>

        {editing.entryMode === 'holebyhole' && activePlayers.length > 0 && (
          <Card>
            <div className="font-display text-lg mb-2" style={{ color: C.text }}>
              Hole-by-hole
            </div>
            <div style={{ overflowX: 'auto' }}>
              <div style={{ display: 'grid', gridTemplateColumns: `110px repeat(${holes.length}, 42px)`, minWidth: 110 + holes.length * 42 }}>
                <div style={{ position: 'sticky', left: 0, background: C.surface }} className="text-[10px] uppercase py-1" >
                  <span style={{ color: C.muted }}>Hole</span>
                </div>
                {holes.map((h, i) => (
                  <div key={i} className="text-[11px] text-center py-1 font-display" style={{ color: C.text }}>
                    {i + 1}
                  </div>
                ))}

  const fileInputRef = useRef(null);
  function patch(p) {
    setSettings((s) => ({ ...s, ...p }));
  }
  function loadSample() {
    const newPlayers = SAMPLE_PLAYERS.map((p, i) => ({ id: uid(), name: p.name, ghin: p.ghin, handicap: p.handicap, team: i % 2 === 0 ? 'team1' : 'team2' }));
    setPlayers(newPlayers);
    const sampleRound = {
      id: uid(),
      date: '2026-06-16',
      courseId: DEFAULT_COURSE.id,
      teeName: 'Grey',
      holes: 18,
      entryMode: 'holebyhole',
      combinedWith: null,
      playerIds: newPlayers.map((p) => p.id),
      skinsOptIn: [],
      playerData: {},
    };
    setRounds([sampleRound]);
  }
  function exportBackup() {
    const data = { settings, players, courses, rounds, availability };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${settings.leagueName.replace(/\s+/g, '-').toLowerCase()}-backup.json`;
    a.click();
    URL.revokeObjectURL(url);
  }
  function importBackup(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (data.settings) setSettings(data.settings);
        if (data.players) setPlayers(data.players);
        if (data.rounds) setRounds(data.rounds);
        if (data.availability) setAvailability(data.availability);
      } catch (err) {
        alert('Could not read that backup file.');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  }
  const [confirmErase, setConfirmErase] = useState(false);
  function eraseEverything() {
    setSettings(DEFAULT_SETTINGS);
    setPlayers([]);
    setRounds([]);
    setAvailability({});
    setConfirmErase(false);
  }

      <Card>

          3. The result (+/-)
        </div>

        </p>
      </Card>

      <Card>
        <div className="font-display text-lg mb-2" style={{ color: C.lime }}>

        </div>
        <ul className="text-sm space-y-2" style={{ color: C.muted }}>
          <li>
            <b style={{ color: C.text }}>Weekly purse:</b> everyone in the round buys in (currently ${settings.purseBuyIn}). ${settings.seasonRakePerRound} is pulled into the season prize pool; the rest pays out by finish vs. quota.
          </li>
          <li>
            <b style={{ color: C.text }}>Skins:</b> a separate opt-in game (currently ${settings.skinsBuyIn} buy-in). Only players who opt in that round pay in and can win.
          </li>
          <li>
            <b style={{ color: C.text }}>Season points:</b> each round awards points by finish position. Your best {settings.topScoresCounted} rounds count toward the season title.
          </li>
          <li>
            <b style={{ color: C.text }}>Team battle:</b> every player is on {settings.team1Name} or {settings.team2Name}. The same season points sum by team.
          </li>
        </ul>
      </Card>

      <Card>
        <div className="font-display text-lg mb-2" style={{ color: C.lime }}>
          5. Running a round day-of
        </div>
        <ul className="text-sm space-y-2" style={{ color: C.muted }}>
          <li>Collect buy-ins. Confirm everyone's quota (auto-shown on the Players tab).</li>
          <li>Play. Track points; if you want skins, keep each player's hole-by-hole gross.</li>
          <li>
            After the round, open <b style={{ color: C.text }}>Rounds & Scores</b>, create the round, and enter points (and hole scores for skins).
          </li>
          <li>The app ranks everyone, splits the purse and skins, and updates the season standings automatically.</li>
        </ul>
      </Card>

      <Card>
        <div className="font-display text-lg mb-2" style={{ color: C.lime }}>
          Playing 9 holes & combining nines
        </div>
        <p className="text-sm" style={{ color: C.muted }}>

        </p>
      </Card>
    </div>
  );

function DogfightLeague() {
  const [loading, setLoading] = useState(true);
  const [activeTab, setActiveTab] = useState('standings');
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [players, setPlayers] = useState(makeDefaultPlayers);
  const [courses] = useState([DEFAULT_COURSE]);
  const [rounds, setRounds] = useState([]);
  const [availability, setAvailability] = useState({});
  const [editingRoundId, setEditingRoundId] = useState(null);
  const saveTimer = useRef(null);

  const [cloudStatus, setCloudStatus] = useState('disconnected'); // disconnected | connecting | connected | error | unavailable
  const [cloudError, setCloudError] = useState('');
  const [cloudLeagueId, setCloudLeagueId] = useState('');
  const dbRef = useRef(null);
  const lastSyncedRef = useRef({ players: {}, rounds: {}, availability: {}, settingsJSON: null });
  const unsubsRef = useRef([]);

  const [aiStatus, setAiStatus] = useState('checking'); // checking | ready | error | unavailable
  const [aiErrorMsg, setAiErrorMsg] = useState('');

  useEffect(() => {
    let tries = 0;
    const iv = setInterval(() => {
      tries++;
      if (typeof window === 'undefined' || typeof window.dflAI === 'undefined') {
        if (tries > 20) {
          setAiStatus('unavailable');
          clearInterval(iv);
        }
        return;
      }
      if (window.dflAI.ready) {
        setAiStatus('ready');
        clearInterval(iv);
      } else if (window.dflAI.error) {
        setAiStatus('error');
        setAiErrorMsg(window.dflAI.error);
        clearInterval(iv);
      } else if (tries > 20) {
        setAiStatus('unavailable');
        clearInterval(iv);
      }
    }, 250);
    return () => clearInterval(iv);
  }, []);

  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get(STORAGE_KEY);
        if (res && res.value) {
          const data = JSON.parse(res.value);
          if (data.settings) setSettings({ ...DEFAULT_SETTINGS, ...data.settings });
          if (data.players) setPlayers(data.players);
          if (data.rounds) setRounds(data.rounds);
          if (data.availability) setAvailability(data.availability);
        }
      } catch (e) {}
      setLoading(false);
    })();
  }, []);

  // connect to Firebase (if configured) once on mount; no-op and harmless if the SDK isn't loaded
  useEffect(() => {
    const cfg = loadCloudConfig();
    if (!cfg) {
      setCloudStatus('disconnected');
      return;
    }
    if (!fbAvailable()) {
      setCloudStatus('unavailable');
      return;
    }
    setCloudStatus('connecting');
    setCloudLeagueId(cfg.leagueId);
    try {
      if (!window.firebase.apps.length) window.firebase.initializeApp(cfg);
      const db = window.firebase.firestore();
      dbRef.current = db;
      const base = db.collection('leagues').doc(cfg.leagueId);
      const onErr = (err) => {
        setCloudStatus('error');
        setCloudError(err && err.message ? err.message : String(err));
      };

      const unsub1 = base.collection('players').onSnapshot((snap) => {
        const arr = [];
        const map = {};
        snap.forEach((doc) => {
          const d = { id: doc.id, ...doc.data() };
          arr.push(d);
          map[doc.id] = JSON.stringify(d);
        });
        lastSyncedRef.current.players = map;
        setPlayers(arr);
      }, onErr);

      const unsub2 = base.collection('rounds').onSnapshot((snap) => {
        const arr = [];
        const map = {};
        snap.forEach((doc) => {
          const d = { id: doc.id, ...doc.data() };
          arr.push(d);
          map[doc.id] = JSON.stringify(d);
        });
        lastSyncedRef.current.rounds = map;
        setRounds(arr);
      }, onErr);

      const unsub3 = base.collection('availability').onSnapshot((snap) => {
        const obj = {};
        const map = {};
        snap.forEach((doc) => {
          obj[doc.id] = doc.data();
          map[doc.id] = JSON.stringify(doc.data());
        });
        lastSyncedRef.current.availability = map;
        setAvailability(obj);
      }, onErr);

      const unsub4 = base.collection('meta').doc('settings').onSnapshot((doc) => {
        if (doc.exists) {
          const data = doc.data();
          lastSyncedRef.current.settingsJSON = JSON.stringify(data);
          setSettings((s) => ({ ...DEFAULT_SETTINGS, ...data }));
        }
      }, onErr);

      unsubsRef.current = [unsub1, unsub2, unsub3, unsub4];
      setCloudStatus('connected');
    } catch (e) {
      setCloudStatus('error');
      setCloudError(e && e.message ? e.message : String(e));
    }
    return () => {
      unsubsRef.current.forEach((u) => u && u());
    };
  }, []);

  useEffect(() => {
    if (loading) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      try {
        await window.storage.set(STORAGE_KEY, JSON.stringify({ settings, players, rounds, availability }));
      } catch (e) {}

      if (dbRef.current && cloudStatus === 'connected') {
        try {
          const db = dbRef.current;
          const base = db.collection('leagues').doc(cloudLeagueId);
          const batch = db.batch();
          let dirty = false;

          const curPlayerIds = new Set(players.map((p) => p.id));
          players.forEach((p) => {
            const j = JSON.stringify(p);
            if (lastSyncedRef.current.players[p.id] !== j) {
              batch.set(base.collection('players').doc(p.id), p);
              lastSyncedRef.current.players[p.id] = j;
              dirty = true;
            }
          });
          Object.keys(lastSyncedRef.current.players).forEach((id) => {
            if (!curPlayerIds.has(id)) {
              batch.delete(base.collection('players').doc(id));
              delete lastSyncedRef.current.players[id];
              dirty = true;
            }
          });

          const curRoundIds = new Set(rounds.map((r) => r.id));
          rounds.forEach((r) => {
            const j = JSON.stringify(r);
            if (lastSyncedRef.current.rounds[r.id] !== j) {
              batch.set(base.collection('rounds').doc(r.id), r);
              lastSyncedRef.current.rounds[r.id] = j;
              dirty = true;
            }
          });
          Object.keys(lastSyncedRef.current.rounds).forEach((id) => {
            if (!curRoundIds.has(id)) {
              batch.delete(base.collection('rounds').doc(id));
              delete lastSyncedRef.current.rounds[id];
              dirty = true;
            }
          });

          const curAvailKeys = new Set(Object.keys(availability));
          curAvailKeys.forEach((key) => {
            const j = JSON.stringify(availability[key]);
            if (lastSyncedRef.current.availability[key] !== j) {
              batch.set(base.collection('availability').doc(key), availability[key]);
              lastSyncedRef.current.availability[key] = j;
              dirty = true;
            }
          });
          Object.keys(lastSyncedRef.current.availability).forEach((key) => {
            if (!curAvailKeys.has(key)) {
              batch.delete(base.collection('availability').doc(key));
              delete lastSyncedRef.current.availability[key];
              dirty = true;
            }
          });

          const settingsJSON = JSON.stringify(settings);
          if (lastSyncedRef.current.settingsJSON !== settingsJSON) {
            batch.set(base.collection('meta').doc('settings'), settings);
            lastSyncedRef.current.settingsJSON = settingsJSON;
            dirty = true;
          }

          if (dirty) await batch.commit();
        } catch (e) {
          setCloudStatus('error');
          setCloudError(e && e.message ? e.message : String(e));
        }
      }
    }, 500);
    return () => clearTimeout(saveTimer.current);
  }, [settings, players, rounds, availability, loading, cloudStatus, cloudLeagueId]);

  if (loading) {
    return (
      <div className="min-h-screen flex items-center justify-center" style={{ background: C.black }}>
        <style>{`@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap'); .font-display{font-family:'Space Grotesk',sans-serif;}`}</style>
        <div className="font-display text-xl" style={{ color: C.lime, textShadow: '0 0 14px rgba(180,255,57,0.5)' }}>
          LOADING…
        </div>
      </div>
    );
  }

  return (
    <div style={{ maxWidth: 480, margin: '0 auto', minHeight: '100vh', background: C.black }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');
        .font-display { font-family: 'Space Grotesk', sans-serif; letter-spacing: 0.01em; }
        body, .app-root { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        input::placeholder { color: ${C.faint}; }
        select { color-scheme: dark; }

        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { 0% { transform: scale(0.82); opacity: 0; } 65% { transform: scale(1.04); opacity: 1; } 100% { transform: scale(1); } }
        @keyframes modalPop { 0% { transform: scale(0.9) translateY(6px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,69,58,0.55); } 50% { box-shadow: 0 0 0 6px rgba(255,69,58,0); } }
        @keyframes limePulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(180,255,57,0.4); } 50% { box-shadow: 0 0 0 5px rgba(180,255,57,0); } }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; } 100% { transform: translateY(-70px) scale(1.5) rotate(20deg); opacity: 0; } }
        @keyframes checkPop { 0% { transform: scale(0.6); } 60% { transform: scale(1.25); } 100% { transform: scale(1); } }
        @keyframes shimmerBar { 0% { background-position: 0% 0; } 100% { background-position: 200% 0; } }
        @keyframes rowIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes barFill { from { width: 0%; } }
        @keyframes wiggle { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-4deg); } 75% { transform: rotate(4deg); } }
        .row-in { animation: rowIn 0.35s cubic-bezier(0.16,1,0.3,1) both; }
        .bar-fill { transition: width 0.7s cubic-bezier(0.16,1,0.3,1); }
        .collapse-grid { display: grid; transition: grid-template-rows 0.28s cubic-bezier(0.16,1,0.3,1); grid-template-rows: 0fr; }
        .collapse-grid.open { grid-template-rows: 1fr; }
        .collapse-inner { overflow: hidden; min-height: 0; }

        .tab-fade-in { animation: fadeSlideUp 0.32s cubic-bezier(0.16,1,0.3,1) both; }
        .fade-in { animation: fadeIn 0.35s ease both; }
        .pop-in { animation: popIn 0.28s cubic-bezier(0.34,1.56,0.64,1) both; }
        .modal-pop { animation: modalPop 0.22s cubic-bezier(0.34,1.56,0.64,1) both; }
        .backdrop-fade { animation: fadeIn 0.18s ease both; }
        .live-pulse { animation: pulseGlow 1.8s ease-in-out infinite; }
        .lime-pulse { animation: limePulse 1.8s ease-in-out infinite; }
        .check-pop { animation: checkPop 0.22s cubic-bezier(0.34,1.56,0.64,1) both; }
        .float-particle { position: absolute; animation: floatUp 1.4s ease-out forwards; pointer-events: none; }

        .tap { transition: transform 0.12s ease, opacity 0.12s ease, background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease; -webkit-tap-highlight-color: transparent; }
        .tap:active { transform: scale(0.94); }
        button { transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, transform 0.1s ease; }
        button:not(:disabled):active { transform: scale(0.96); }
        a, button, [role="button"] { -webkit-tap-highlight-color: transparent; }
      `}</style>
      <div className="app-root min-h-screen">
        <div className="flex items-center gap-3 px-4 pt-6 pb-4">
          <div className="text-3xl">🏌️</div>
          <div className="flex-1 min-w-0">
            <div className="font-display text-2xl leading-none" style={{ color: C.text }}>
              {settings.leagueName}
            </div>
            <div className="text-xs mt-1" style={{ color: C.muted }}>
              Quota points · Weekly purse · Skins · Season standings
            </div>
          </div>
          <button
            onClick={() => setActiveTab('settings')}
            className="flex items-center gap-1.5 px-2 py-1 rounded-full shrink-0 tap"
            style={{ background: C.surface2 }}
            title={cloudStatus === 'connected' ? `Synced · ${cloudLeagueId}` : 'Local only'}
          >
            <span
              className={`w-2 h-2 rounded-full ${cloudStatus === 'connected' ? 'lime-pulse' : ''}`}
              style={{
                background: cloudStatus === 'connected' ? C.lime : cloudStatus === 'error' ? C.red : cloudStatus === 'connecting' ? C.gold : C.faint,
              }}
            />
            <span className="text-[10px] font-semibold" style={{ color: C.muted }}>
              {cloudStatus === 'connected' ? 'Synced' : cloudStatus === 'connecting' ? 'Syncing…' : cloudStatus === 'error' ? 'Sync error' : 'Local'}
            </span>
          </button>
        </div>

        <div className="flex gap-5 overflow-x-auto px-4 pb-2 scrollbar-hide sticky top-0 z-10" style={{ background: C.black, borderBottom: `1px solid ${C.border}` }}>
          {TABS.map((t) => (
            <button
              key={t.id}
              onClick={() => {
                setActiveTab(t.id);
                if (t.id !== 'rounds') setEditingRoundId(null);
              }}
              className="shrink-0 pb-2 text-sm font-semibold whitespace-nowrap"
              style={{
                color: activeTab === t.id ? C.text : C.muted,
                borderBottom: activeTab === t.id ? `2px solid ${C.lime}` : '2px solid transparent',
                transition: 'color 0.2s ease, border-color 0.2s ease',
              }}
            >
              {t.label}
            </button>
          ))}
        </div>

        <div key={activeTab} className="px-4 pt-4 pb-10 tab-fade-in">
          {activeTab === 'standings' && <StandingsTab settings={settings} players={players} rounds={rounds} courses={courses} onGoPlayers={() => setActiveTab('players')} />}
          {activeTab === 'rounds' && (
            <RoundsTab settings={settings} players={players} courses={courses} rounds={rounds} setRounds={setRounds} editingRoundId={editingRoundId} setEditingRoundId={setEditingRoundId} />
          )}
          {activeTab === 'skins' && <SkinsTab settings={settings} players={players} rounds={rounds} courses={courses} />}
          {activeTab === 'calendar' && <CalendarTab players={players} availability={availability} setAvailability={setAvailability} />}
          {activeTab === 'gamefinder' && (
            <GameFinderTab players={players} courses={courses} setRounds={setRounds} setEditingRoundId={setEditingRoundId} setActiveTab={setActiveTab} />
          )}
          {activeTab === 'players' && <PlayersTab settings={settings} players={players} setPlayers={setPlayers} />}
          {activeTab === 'settings' && (
            <SettingsTab
              settings={settings}
              setSettings={setSettings}
              players={players}
              setPlayers={setPlayers}
              courses={courses}
              rounds={rounds}
              setRounds={setRounds}
              availability={availability}
              setAvailability={setAvailability}
              cloudStatus={cloudStatus}
              cloudError={cloudError}
              cloudLeagueId={cloudLeagueId}
              aiStatus={aiStatus}
              aiErrorMsg={aiErrorMsg}
            />
          )}
          {activeTab === 'howitworks' && <HowItWorksTab settings={settings} />}
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<DogfightLeague />);
</script>
</body>
</html>
