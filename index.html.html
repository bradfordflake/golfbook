// ---- storage shim: mirrors the Claude-artifact window.storage API, backed by localStorage ----
window.storage = {
  async get(key) {
    try {
      const v = localStorage.getItem('dfl:' + key);
      if (v == null) return null;
      return { key, value: v };
    } catch (e) { return null; }
  },
  async set(key, value) {
    try { localStorage.setItem('dfl:' + key, value); } catch (e) {}
    return { key, value };
  },
  async delete(key) {
    try { localStorage.removeItem('dfl:' + key); } catch (e) {}
    return { key, deleted: true };
  },
};

// ---------- helpers ----------
function uid() {
  return Math.random().toString(36).slice(2, 9);
}
function roundHalfDown(x) {
  return Math.ceil(x - 0.5);
}
function quotaFromIndex(quotaBase, handicap) {
  return roundHalfDown(quotaBase - handicap);
}
function courseParTotal(course, n) {
  return course.holes.slice(0, n).reduce((s, h) => s + h.par, 0);
}
function stablefordPoints(strokes, par) {
  const d = strokes - par;
  if (d >= 2) return 0;
  if (d === 1) return 1;
  if (d === 0) return 2;
  if (d === -1) return 3;
  if (d === -2) return 4;
  return 5;
}
function roundHoles(round, course) {
  return round.holes === 9 ? course.holes.slice(0, 9) : course.holes;
}
function localRanks(holes) {
  const withIdx = holes.map((h, i) => ({ i, si: h.si }));
  const sorted = [...withIdx].sort((a, b) => a.si - b.si);
  const rank = new Array(holes.length);
  sorted.forEach((h, r) => (rank[h.i] = r + 1));
  return rank;
}
function strokesOnHole(strokesReceived, rank, holesCount) {
  if (!strokesReceived || strokesReceived <= 0) return 0;
  const base = Math.floor(strokesReceived / holesCount);
  const extra = strokesReceived % holesCount;
  return base + (rank <= extra ? 1 : 0);
}
function getTee(course, teeName) {
  return course.tees.find((t) => t.name === teeName) || course.tees[0];
}
function playerQuotaInRound(settings, round, player, course) {
  const pd = round.playerData[player.id];
  if (pd && pd.quotaOverride != null) return pd.quotaOverride;
  const tee = getTee(course, round.teeName);
  const fullPar = courseParTotal(course, 18);
  const ch18 = Math.round((player.handicap * tee.slope) / 113 + (tee.rating - fullPar));
  if (round.holes === 18) return roundHalfDown(settings.quotaBase - ch18);
  const ch9 = roundHalfDown(ch18 / 2);
  const qBase9 = roundHalfDown(settings.quotaBase / 2);
  return roundHalfDown(qBase9 - ch9);
}
function roundPlayerList(round, players) {
  if (Array.isArray(round.playerIds)) return players.filter((p) => round.playerIds.includes(p.id));
  return players; // backward compat: rounds created before player-selection existed show everyone
}
function courseHandicapFor(round, player, course) {
  const tee = getTee(course, round.teeName);
  const fullPar = courseParTotal(course, 18);
  const ch18 = Math.round((player.handicap * tee.slope) / 113 + (tee.rating - fullPar));
  return round.holes === 9 ? roundHalfDown(ch18 / 2) : ch18;
}
function strokesThisHole(round, player, course, holeIdx) {
  const holes = roundHoles(round, course);
  const ch = Math.max(0, courseHandicapFor(round, player, course));
  const ranks = localRanks(holes);
  return strokesOnHole(ch, ranks[holeIdx], holes.length);
}
function playerPointsInRound(round, player, course) {
  if (Array.isArray(round.playerIds) && !round.playerIds.includes(player.id)) return null;
  const pd = round.playerData[player.id];
  if (!pd) return null;
  if (round.entryMode === 'points') return pd.points != null ? pd.points : null;
  const holes = roundHoles(round, course);
  const net = round.pointsBasis === 'net';
  const ranks = net ? localRanks(holes) : null;
  const ch = net ? Math.max(0, courseHandicapFor(round, player, course)) : 0;
  let total = 0,
    count = 0;
  holes.forEach((h, i) => {
    const s = pd.holeScores ? pd.holeScores[i] : null;
    if (s != null) {
      const eff = net ? s - strokesOnHole(ch, ranks[i], holes.length) : s;
      total += stablefordPoints(eff, h.par);
      count++;
    }
  });
  return count > 0 ? total : null;
}
function playerResultInRound(settings, round, player, course) {
  const pts = playerPointsInRound(round, player, course);
  if (pts == null) return null;
  const quota = playerQuotaInRound(settings, round, player, course);
  return { points: pts, quota, result: pts - quota };
}
function getEvents(rounds) {
  const seen = new Set();
  const events = [];
  rounds.forEach((r) => {
    if (seen.has(r.id)) return;
    const partner = r.combinedWith ? rounds.find((x) => x.id === r.combinedWith) : null;
    if (partner) {
      events.push({ id: r.id, roundIds: [r.id, partner.id], date: r.date });
      seen.add(r.id);
      seen.add(partner.id);
    } else {
      events.push({ id: r.id, roundIds: [r.id], date: r.date });
      seen.add(r.id);
    }
  });
  return events;
}
function eventResultForPlayer(settings, event, rounds, courses, player) {
  let pts = 0,
    quota = 0,
    any = false;
  event.roundIds.forEach((rid) => {
    const r = rounds.find((x) => x.id === rid);
    if (!r) return;
    const course = courses.find((c) => c.id === r.courseId);
    if (!course) return;
    const res = playerResultInRound(settings, r, player, course);
    if (res) {
      pts += res.points;
      quota += res.quota;
      any = true;
    }
  });
  return any ? { points: pts, quota, result: pts - quota } : null;
}
function seasonPointsForRank(settings, rank) {
  const arr = settings.seasonPointsByFinish;
  if (!arr.length) return 0;
  if (rank <= arr.length) return arr[rank - 1];
  return arr[arr.length - 1];
}
function computeEventRanking(settings, event, rounds, courses, players) {
  const results = players
    .map((p) => ({ id: p.id, r: eventResultForPlayer(settings, event, rounds, courses, p) }))
    .filter((x) => x.r);
  results.sort((a, b) => b.r.result - a.r.result);
  const pointsMap = {};
  results.forEach((x, i) => (pointsMap[x.id] = seasonPointsForRank(settings, i + 1)));
  return { pointsMap, ranked: results };
}
function computeSeason(settings, rounds, courses, players) {
  const events = getEvents(rounds);
  const perPlayerPts = {};
  const perPlayerRaw = {};
  players.forEach((p) => {
    perPlayerPts[p.id] = [];
    perPlayerRaw[p.id] = [];
  });
  events.forEach((ev) => {
    const { pointsMap, ranked } = computeEventRanking(settings, ev, rounds, courses, players);
    ranked.forEach((x) => {
      perPlayerPts[x.id].push(pointsMap[x.id]);
      perPlayerRaw[x.id].push(x.r.result);
    });
  });
  const seasonTotals = {};
  const rawTotals = {};
  const roundsPlayed = {};
  players.forEach((p) => {
    const sorted = [...perPlayerPts[p.id]].sort((a, b) => b - a);
    const top = sorted.slice(0, settings.topScoresCounted);
    seasonTotals[p.id] = top.reduce((a, b) => a + b, 0);
    const sortedRaw = [...perPlayerRaw[p.id]].sort((a, b) => b - a).slice(0, settings.topScoresCounted);
    rawTotals[p.id] = sortedRaw.reduce((a, b) => a + b, 0);
    roundsPlayed[p.id] = perPlayerPts[p.id].length;
  });
  const anyResults = players.some((p) => perPlayerPts[p.id].length > 0);
  return { seasonTotals, rawTotals, roundsPlayed, eventsCount: events.length, anyResults };
}
function computeSkinsForRound(round, allPlayers, course, settings) {
  if (round.entryMode !== 'holebyhole') return null;
  const optIn = (round.skinsOptIn || []).filter((id) => !Array.isArray(round.playerIds) || round.playerIds.includes(id));
  if (optIn.length < 2 || settings.skinsBuyIn <= 0) return null;
  const players = allPlayers.filter((p) => optIn.includes(p.id));
  const holes = roundHoles(round, course);
  const tee = getTee(course, round.teeName);
  const netMode = settings.skinsType === 'net';
  let strokesMap = {};
  if (netMode) {
    const fullPar = courseParTotal(course, 18);
    const chVals = players.map((p) => ({ id: p.id, ch: Math.round((p.handicap * tee.slope) / 113 + (tee.rating - fullPar)) }));
    const min = Math.min(...chVals.map((v) => v.ch));
    chVals.forEach((v) => (strokesMap[v.id] = v.ch - min));
  }
  const ranks = localRanks(holes);
  const tally = {};
  players.forEach((p) => (tally[p.id] = 0));
  let carry = 0,
    thru = 0;
  for (let h = 0; h < holes.length; h++) {
    const allIn = players.every((p) => round.playerData[p.id]?.holeScores?.[h] != null);
    if (!allIn) break;
    thru = h + 1;
    const vals = players.map((p) => {
      const g = round.playerData[p.id].holeScores[h];
      const v = netMode ? g - strokesOnHole(strokesMap[p.id] || 0, ranks[h], holes.length) : g;
      return { id: p.id, v };
    });
    const min = Math.min(...vals.map((v) => v.v));
    const winners = vals.filter((v) => v.v === min);
    carry += 1;
    if (winners.length === 1) {
      tally[winners[0].id] += carry;
      carry = 0;
    }
  }
  const totalSkins = Object.values(tally).reduce((a, b) => a + b, 0);
  const pot = settings.skinsBuyIn * players.length;
  const payouts = {};
  players.forEach((p) => (payouts[p.id] = totalSkins > 0 ? Math.round((tally[p.id] / totalSkins) * pot * 100) / 100 : 0));
  return { pot, players, tally, payouts, totalSkins, carry, thru };
}
function purseForRound(settings, round, players, course) {
  const scored = players.filter((p) => playerPointsInRound(round, p, course) != null);
  const pot = settings.purseBuyIn * scored.length;
  const rake = scored.length > 0 ? settings.seasonRakePerRound : 0;
  const payoutPool = Math.max(0, pot - rake);
  const ranked = scored
    .map((p) => ({ id: p.id, result: playerResultInRound(settings, round, p, course).result }))
    .sort((a, b) => b.result - a.result);
  const payouts = {};
  ranked.forEach((r, i) => {
    const pct = settings.purseSplits[i] || 0;
    payouts[r.id] = Math.round((payoutPool * pct) / 100);
  });
  return { pot, rake, payoutPool, ranked, payouts, scoredCount: scored.length };
}

function NumStepper({ value, onChange, step = 1, min, max, decimals = 0 }) {
  const clamp = (v) => {
    let n = v;
    if (min != null) n = Math.max(min, n);
    if (max != null) n = Math.min(max, n);
    return +n.toFixed(decimals);
  };
  return (
    <div className="flex items-center gap-2">
      <button onClick={() => onChange(clamp(value - step))} className="w-7 h-7 rounded-full flex items-center justify-center shrink-0" style={{ background: C.surface2, color: C.text }}>
        <Minus size={12} />
      </button>
      <span className="w-10 text-center font-display text-sm" style={{ color: C.text }}>
        {decimals ? value.toFixed(decimals) : value}
      </span>
      <button onClick={() => onChange(clamp(value + step))} className="w-7 h-7 rounded-full flex items-center justify-center shrink-0" style={{ background: C.surface2, color: C.text }}>
        <Plus size={12} />
      </button>
    </div>
  );
}

// ---------- Standings tab ----------
function StandingsTab({ settings, players, rounds, courses, onGoPlayers }) {
  const season = computeSeason(settings, rounds, courses, players);
  const team1 = players.filter((p) => p.team === 'team1');
  const team2 = players.filter((p) => p.team === 'team2');
  const t1pts = team1.reduce((s, p) => s + (season.seasonTotals[p.id] || 0), 0);
  const t2pts = team2.reduce((s, p) => s + (season.seasonTotals[p.id] || 0), 0);
  const t1raw = team1.reduce((s, p) => s + (season.rawTotals[p.id] || 0), 0);
  const t2raw = team2.reduce((s, p) => s + (season.rawTotals[p.id] || 0), 0);
  const total = t1pts + t2pts;
  const t1pct = total > 0 ? Math.round((t1pts / total) * 100) : 50;

  const moneyByPlayer = {};
  players.forEach((p) => (moneyByPlayer[p.id] = 0));
  rounds.forEach((r) => {
    const course = courses.find((c) => c.id === r.courseId);
    if (!course) return;
    const { payouts } = purseForRound(settings, r, players, course);
    Object.entries(payouts).forEach(([pid, amt]) => (moneyByPlayer[pid] = (moneyByPlayer[pid] || 0) + amt));
  });
  const t1money = team1.reduce((s, p) => s + moneyByPlayer[p.id], 0);
  const t2money = team2.reduce((s, p) => s + moneyByPlayer[p.id], 0);

  const moneyInPlay = rounds.reduce((sum, r) => {
    const course = courses.find((c) => c.id === r.courseId);
    if (!course) return sum;
    const scored = players.filter((p) => playerPointsInRound(r, p, course) != null).length;
    return sum + settings.purseBuyIn * scored;
  }, 0);
  const seasonBuyIns = settings.seasonBuyIn * players.length;
  const countingRounds = rounds.filter((r) => {
    const course = courses.find((c) => c.id === r.courseId);
    return course && players.some((p) => playerPointsInRound(r, p, course) != null);
  });
  const weeklyRake = countingRounds.length * settings.seasonRakePerRound;
  const totalPool = seasonBuyIns + weeklyRake;

  const leaderboard = [...players].sort((a, b) => (season.seasonTotals[b.id] || 0) - (season.seasonTotals[a.id] || 0));
  const leader = season.anyResults ? leaderboard[0] : null;

  return (

// ---------- Live scoring ----------
function LiveScoring({ settings, round, players, course, patchRound, setHoleScore, onBackToSetup, onFinish }) {
  const holes = roundHoles(round, course);
  const activePlayers = roundPlayerList(round, players);
  const holeIdx = Math.min(round.currentHole || 0, holes.length - 1);
  const hole = holes[holeIdx];
  const net = round.pointsBasis === 'net';

  // Default every player to par as soon as a hole is opened, so a par round takes zero taps.
  useEffect(() => {
    activePlayers.forEach((p) => {
      if (round.playerData[p.id]?.holeScores?.[holeIdx] == null) {
        setHoleScore(round.id, p.id, holeIdx, hole.par);
      }
    });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [holeIdx, round.id]);

  function setHole(i) {
    patchRound(round.id, { currentHole: i });
  }
  function bump(playerId, delta) {
    const cur = round.playerData[playerId]?.holeScores?.[holeIdx];
    const base = cur == null ? hole.par : cur;
    setHoleScore(round.id, playerId, holeIdx, Math.max(1, base + delta));
  }
  function resetToPar(playerId) {
    setHoleScore(round.id, playerId, holeIdx, hole.par);
  }

  const allScoredThisHole = activePlayers.length > 0 && activePlayers.every((p) => round.playerData[p.id]?.holeScores?.[holeIdx] != null);
  const board = activePlayers
    .map((p) => {
      const res = playerResultInRound(settings, round, p, course);
      const thru = holes.filter((h, i) => round.playerData[p.id]?.holeScores?.[i] != null).length;
      return { p, res, thru };
    })
    .sort((a, b) => (b.res ? b.res.result : -999) - (a.res ? a.res.result : -999));

  return (
    <div>
      <div className="flex items-center justify-between mb-3">
        <button onClick={onBackToSetup} className="text-sm font-semibold" style={{ color: C.lime }}>
          ← Round setup
        </button>
        <div className="flex items-center gap-2">
          <span className="text-[10px] uppercase" style={{ color: C.muted }}>
            Points
          </span>
          <div className="flex rounded-full p-0.5" style={{ background: C.surface2 }}>
            {['gross', 'net'].map((v) => (
              <button
                key={v}
                onClick={() => patchRound(round.id, { pointsBasis: v })}
                className="px-3 py-1 rounded-full text-[11px] font-bold uppercase"
                style={{ background: (round.pointsBasis || 'gross') === v ? C.lime : 'transparent', color: (round.pointsBasis || 'gross') === v ? '#000' : C.muted }}
              >
                {v}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* hole strip */}
      <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
        {holes.map((h, i) => {
          const done = activePlayers.length > 0 && activePlayers.every((p) => round.playerData[p.id]?.holeScores?.[i] != null);
          return (
            <button
              key={i}
              onClick={() => setHole(i)}
              className="shrink-0 w-9 h-9 rounded-full flex items-center justify-center font-display text-sm"
              style={{
                background: i === holeIdx ? C.lime : done ? C.surface3 : C.surface2,
                color: i === holeIdx ? '#000' : done ? C.lime : C.muted,
                border: done && i !== holeIdx ? `1px solid ${C.lime}` : '1px solid transparent',
              }}
            >
              {i + 1}
            </button>
          );
        })}
      </div>

      {/* hole header */}
      <div className="text-center py-3">
        <div className="font-display text-3xl leading-none" style={{ color: C.text }}>
          HOLE {holeIdx + 1}
        </div>
        <div className="font-display text-xs mt-1" style={{ color: C.muted }}>
          PAR {hole.par} · STROKE INDEX {hole.si}
        </div>
      </div>

      {/* score rows */}
      {activePlayers.map((p) => {
        const strokes = strokesThisHole(round, p, course, holeIdx);
        const gross = round.playerData[p.id]?.holeScores?.[holeIdx];
        const eff = gross != null ? (net ? gross - strokes : gross) : null;
        const pts = eff != null ? stablefordPoints(eff, hole.par) : null;
        return (
          <div key={p.id} className="rounded-2xl p-3 mb-2" style={{ background: C.surface, border: `1px solid ${C.border}` }}>
            <div className="flex items-center justify-between">
              <div className="min-w-0 flex-1">
                <div className="flex items-center gap-1.5">
                  <span className="font-medium text-sm truncate" style={{ color: C.text }}>
                    {p.name}
                  </span>
                  {strokes > 0 && (
                    <span className="shrink-0 px-1.5 py-0.5 rounded-full text-[10px] font-bold" style={{ background: 'rgba(180,255,57,0.15)', color: C.lime }}>
                      {'●'.repeat(Math.min(strokes, 3))} {strokes > 1 ? `+${strokes}` : 'stroke'}
                    </span>
                  )}
                </div>
                <div className="text-[10px] mt-0.5" style={{ color: C.faint }}>
                  {pts != null ? `${pts} pt${pts === 1 ? '' : 's'} this hole${net && strokes > 0 ? ` (net ${eff})` : ''}` : strokes > 0 ? `Gets ${strokes} stroke${strokes > 1 ? 's' : ''} here` : 'No stroke this hole'}
                </div>
              </div>
              <div className="flex items-center gap-3 shrink-0">
                <button onClick={() => bump(p.id, -1)} className="w-9 h-9 rounded-full flex items-center justify-center" style={{ background: C.surface2, color: C.text }}>
                  <Minus size={15} />
                </button>
                <button onClick={() => resetToPar(p.id)} className="w-8 text-center font-display text-xl" style={{ color: gross != null ? C.text : C.faint }}>
                  {gross ?? hole.par}
                </button>
                <button onClick={() => bump(p.id, 1)} className="w-9 h-9 rounded-full flex items-center justify-center" style={{ background: C.lime, color: '#000' }}>
                  <Plus size={15} />
                </button>
              </div>
            </div>
          </div>
        );
      })}
      <div className="text-[10px] text-center mb-3" style={{ color: C.faint }}>
        Defaults to par — tap +/− to adjust, tap the score to reset it
      </div>

      {/* prev / next */}
      <div className="flex gap-2 mb-4">
        <GhostButton onClick={() => setHole(Math.max(0, holeIdx - 1))} style={{ flex: 1, textAlign: 'center', opacity: holeIdx === 0 ? 0.4 : 1 }}>
          ← Hole {Math.max(1, holeIdx)}
        </GhostButton>
        {holeIdx < holes.length - 1 ? (
          <PrimaryButton onClick={() => setHole(holeIdx + 1)} style={{ flex: 1, textAlign: 'center', opacity: allScoredThisHole ? 1 : 0.85 }}>
            Hole {holeIdx + 2} →
          </PrimaryButton>
        ) : (
          <PrimaryButton onClick={onFinish} style={{ flex: 1, textAlign: 'center' }}>
            Finish round ✓
          </PrimaryButton>
        )}
      </div>

      {/* live leaderboard */}
      <Card>
        <div className="font-display text-lg mb-2" style={{ color: C.text }}>
          Live Standings
        </div>
        {board.map(({ p, res, thru }, i) => (
          <div key={p.id} className="flex items-center justify-between py-2" style={{ borderBottom: `1px solid ${C.border}` }}>
            <div className="flex items-center gap-2 min-w-0">
              <span className="font-display text-xs w-4" style={{ color: i === 0 && res ? C.gold : C.faint }}>
                {i + 1}
              </span>
              <span className="text-sm truncate" style={{ color: i === 0 && res ? C.text : C.muted, fontWeight: i === 0 && res ? 700 : 500 }}>
                {p.name}
              </span>
            </div>
            <div className="flex items-center gap-2 shrink-0">
              <span className="text-[10px]" style={{ color: C.faint }}>
                {res ? `${res.points} pts · q${res.quota} · thru ${thru}` : 'no scores'}
              </span>
              <span className="font-display text-base w-10 text-right" style={{ color: res ? (res.result >= 0 ? C.lime : C.red) : C.faint }}>
                {res ? (res.result >= 0 ? '+' : '') + res.result : '–'}
              </span>
            </div>
          </div>
        ))}
      </Card>

      <GhostButton onClick={onFinish} style={{ width: '100%', textAlign: 'center', marginBottom: 24 }}>
        End live scoring
      </GhostButton>
    </div>
  );
}

// ---------- Rounds & Scores tab ----------
function RoundsTab({ settings, players, courses, rounds, setRounds, editingRoundId, setEditingRoundId }) {
  function newRound() {
    const course = courses[0];
    const r = {
      id: uid(),
      date: new Date().toISOString().slice(0, 10),
      courseId: course.id,
      teeName: course.tees[0].name,
      holes: 18,
      entryMode: 'points',
      combinedWith: null,
      playerIds: [],
      skinsOptIn: [],
      playerData: {},
      status: 'setup',
      currentHole: 0,
      pointsBasis: 'gross',
    };
    setRounds((rs) => [r, ...rs]);
    setEditingRoundId(r.id);
  }
  function deleteRound(id) {
    setRounds((rs) => rs.filter((r) => r.id !== id).map((r) => (r.combinedWith === id ? { ...r, combinedWith: null } : r)));
    setEditingRoundId(null);
  }
  function patchRound(id, patch) {
    setRounds((rs) => rs.map((r) => (r.id === id ? { ...r, ...patch } : r)));
  }
  function togglePlayerInRound(roundId, playerId) {
    setRounds((rs) =>
      rs.map((r) => {
        if (r.id !== roundId) return r;
        const current = Array.isArray(r.playerIds) ? r.playerIds : players.map((p) => p.id);
        const set = new Set(current);
        if (set.has(playerId)) set.delete(playerId);
        else set.add(playerId);
        return { ...r, playerIds: Array.from(set) };
      })
    );
  }
  function setRoundPlayerIds(roundId, ids) {
    patchRound(roundId, { playerIds: ids });
  }
  function patchPlayerData(roundId, playerId, patch) {
    setRounds((rs) =>
      rs.map((r) => {
        if (r.id !== roundId) return r;
        const pd = { ...(r.playerData[playerId] || {}), ...patch };
        return { ...r, playerData: { ...r.playerData, [playerId]: pd } };
      })
    );
  }
  function setHoleScore(roundId, playerId, holeIdx, val) {
    setRounds((rs) =>
      rs.map((r) => {
        if (r.id !== roundId) return r;
        const pd = r.playerData[playerId] || {};
        const holeScores = { ...(pd.holeScores || {}), [holeIdx]: val };
        return { ...r, playerData: { ...r.playerData, [playerId]: { ...pd, holeScores } } };
      })
    );
  }
  function toggleSkinsOptIn(roundId, playerId) {
    setRounds((rs) =>
      rs.map((r) => {
        if (r.id !== roundId) return r;
        const set = new Set(r.skinsOptIn || []);
        if (set.has(playerId)) set.delete(playerId);
        else set.add(playerId);
        return { ...r, skinsOptIn: Array.from(set) };
      })
    );
  }

  const editing = rounds.find((r) => r.id === editingRoundId);

  if (editing && editing.status === 'live') {
    const course = courses.find((c) => c.id === editing.courseId) || courses[0];
    return (
      <LiveScoring
        settings={settings}
        round={editing}
        players={players}
        course={course}
        patchRound={patchRound}
        setHoleScore={setHoleScore}
        onBackToSetup={() => patchRound(editing.id, { status: 'setup' })}
        onFinish={() => {
          patchRound(editing.id, { status: 'final' });
          setEditingRoundId(null);
        }}
      />
    );
  }

  if (editing) {
    const course = courses.find((c) => c.id === editing.courseId) || courses[0];
    const tee = getTee(course, editing.teeName);
    const holes = roundHoles(editing, course);
    const otherNines = rounds.filter((r) => r.id !== editing.id && r.holes === 9 && (!r.combinedWith || r.combinedWith === editing.id));
    const activePlayers = roundPlayerList(editing, players);
    const selectedIds = Array.isArray(editing.playerIds) ? editing.playerIds : players.map((p) => p.id);
    const scoredCount = activePlayers.filter((p) => playerPointsInRound(editing, p, course) != null).length;

    return (
      <div>
        <button onClick={() => setEditingRoundId(null)} className="text-sm font-semibold mb-3" style={{ color: C.lime }}>
          ← Rounds
        </button>

        <Card>
          <div className="grid grid-cols-2 gap-2 mb-2">
            <TextField label="Date" type="date" value={editing.date} onChange={(v) => patchRound(editing.id, { date: v })} />
            <SelectField
              label="Course"
              value={editing.courseId}
              onChange={(v) => {
                const c = courses.find((x) => x.id === v);
                patchRound(editing.id, { courseId: v, teeName: c.tees[0].name });
              }}
              options={courses.map((c) => ({ value: c.id, label: c.name }))}
            />
          </div>
          <div className="grid grid-cols-2 gap-2 mb-2">
            <SelectField
              label="Tees"
              value={editing.teeName}
              onChange={(v) => patchRound(editing.id, { teeName: v })}
              options={course.tees.map((t) => ({ value: t.name, label: `${t.name} ${t.rating}/${t.slope}` }))}
            />
            <div>
              <div className="text-[10px] uppercase tracking-wide mb-1" style={{ color: C.muted }}>
                Holes
              </div>
              <Toggle2
                value={editing.holes}
                onChange={(v) => patchRound(editing.id, { holes: v, combinedWith: v === 18 ? null : editing.combinedWith })}
                options={[{ value: 18, label: '18' }, { value: 9, label: '9' }]}
              />
            </div>
          </div>
          <div className="mb-2">
            <div className="text-[10px] uppercase tracking-wide mb-1" style={{ color: C.muted }}>
              Entry mode
            </div>
            <Toggle2
              value={editing.entryMode}
              onChange={(v) => patchRound(editing.id, { entryMode: v })}
              options={[{ value: 'points', label: 'Points' }, { value: 'holebyhole', label: 'Hole-by-hole' }]}
            />
          </div>
          {editing.holes === 9 && (
            <SelectField
              label="Combine with"
              value={editing.combinedWith || ''}
              onChange={(v) => {
                patchRound(editing.id, { combinedWith: v || null });
                if (v) patchRound(v, { combinedWith: editing.id });
              }}
              options={[{ value: '', label: 'None' }, ...otherNines.map((r) => ({ value: r.id, label: `${r.date} · ${courses.find((c) => c.id === r.courseId)?.name || ''}` }))]}
            />
          )}

          <InfoNote>
            Quota = {settings.quotaBase} − Course Handicap (Index adjusted for the {tee.name} tee, {tee.rating}/{tee.slope}) — auto-calculated from each player's handicap and the selected tee, recalculated when you change the tee. Editable per round. Hole-by-hole gross scores feed the skins game.
          </InfoNote>
          <InfoNote>
            {course.name} · <b style={{ color: C.text }}>{tee.name}</b> tee · rating {tee.rating} / slope {tee.slope} · par {courseParTotal(course, editing.holes)}. Pars & stroke index show on the hole grid below.
          </InfoNote>
        </Card>

        <Card>
          <div className="flex items-center justify-between mb-2">
            <div className="font-display text-sm" style={{ color: C.lime }}>
              SELECT PLAYERS — {selectedIds.length} OF {players.length}
            </div>
            <div className="flex gap-2">
              <button onClick={() => setRoundPlayerIds(editing.id, players.map((p) => p.id))} className="text-xs font-semibold" style={{ color: C.lime }}>
                All
              </button>
              <button onClick={() => setRoundPlayerIds(editing.id, [])} className="text-xs font-semibold" style={{ color: C.muted }}>
                Clear
              </button>
            </div>
          </div>
          <div className="grid grid-cols-2 gap-2">
            {players.map((p) => (
              <button
                key={p.id}
                onClick={() => togglePlayerInRound(editing.id, p.id)}
                className="flex items-center gap-2 rounded-xl px-3 py-2 text-left"
                style={{ background: C.surface2 }}
              >
                <span
                  className="w-4 h-4 rounded shrink-0"
                  style={{ background: selectedIds.includes(p.id) ? C.lime : 'transparent', border: `1.5px solid ${selectedIds.includes(p.id) ? C.lime : C.faint}` }}
                />
                <span className="text-sm truncate" style={{ color: C.text }}>
                  {p.name}
                </span>
              </button>
            ))}
            {players.length === 0 && (
              <div className="text-sm col-span-2" style={{ color: C.muted }}>
                No players in the league yet — add some in the Players tab.
              </div>
            )}
          </div>
        </Card>

        {editing.entryMode === 'holebyhole' && settings.skinsBuyIn > 0 && activePlayers.length > 0 && (
          <Card>
            <div className="font-display text-sm mb-2" style={{ color: C.lime }}>
              SKINS OPT-IN — ${settings.skinsBuyIn} EACH · {(editing.skinsOptIn || []).length} IN · ${settings.skinsBuyIn * (editing.skinsOptIn || []).length} POT
            </div>
            <div className="grid grid-cols-2 gap-2">
              {activePlayers.map((p) => (
                <button
                  key={p.id}
                  onClick={() => toggleSkinsOptIn(editing.id, p.id)}
                  className="flex items-center gap-2 rounded-xl px-3 py-2 text-left"
                  style={{ background: C.surface2 }}
                >
                  <span
                    className="w-4 h-4 rounded shrink-0"
                    style={{ background: (editing.skinsOptIn || []).includes(p.id) ? C.lime : 'transparent', border: `1.5px solid ${(editing.skinsOptIn || []).includes(p.id) ? C.lime : C.faint}` }}
                  />
                  <span className="text-sm truncate" style={{ color: C.text }}>
                    {p.name}
                  </span>
                </button>
              ))}
            </div>
          </Card>
        )}

        <Card>
          <div className="font-display text-lg mb-2" style={{ color: C.text }}>
            Scores — {scoredCount}/{activePlayers.length} entered
          </div>
          {activePlayers.length === 0 && (
            <p className="text-sm" style={{ color: C.muted }}>
              Select who's playing above to start entering scores.
            </p>
          )}
          {activePlayers.map((p) => {
            const res = playerResultInRound(settings, editing, p, course);
            const quota = playerQuotaInRound(settings, editing, p, course);
            return (
              <div key={p.id} className="flex items-center justify-between py-2" style={{ borderBottom: `1px solid ${C.border}` }}>
                <span className="text-sm truncate flex-1" style={{ color: C.text }}>
                  {p.name}
                </span>
                <div className="flex items-center gap-3 shrink-0">
                  <div className="text-center">
                    <div className="text-[9px] uppercase" style={{ color: C.faint }}>
                      Quota
                    </div>
                    <input
                      type="number"
                      className="w-12 text-center text-sm rounded-lg px-1 py-0.5 outline-none"
                      style={{ background: C.surface2, color: C.muted }}
                      value={editing.playerData[p.id]?.quotaOverride ?? quota}
                      onChange={(e) => patchPlayerData(editing.id, p.id, { quotaOverride: e.target.value === '' ? null : Number(e.target.value) })}
                    />
                  </div>
                  <div className="text-center">
                    <div className="text-[9px] uppercase" style={{ color: C.faint }}>
                      Points
                    </div>
                    {editing.entryMode === 'points' ? (
                      <input
                        type="number"
                        className="w-14 text-center text-sm rounded-lg px-1 py-0.5 outline-none"
                        style={{ background: C.surface2, color: C.text }}
                        value={editing.playerData[p.id]?.points ?? ''}
                        onChange={(e) => patchPlayerData(editing.id, p.id, { points: e.target.value === '' ? null : Number(e.target.value) })}
                      />
                    ) : (
                      <div className="w-14 text-center font-display text-sm" style={{ color: C.text }}>
                        {res ? res.points : '–'}
                      </div>
                    )}
                  </div>
                  <div className="text-center w-12">
                    <div className="text-[9px] uppercase" style={{ color: C.faint }}>
                      +/-
                    </div>
                    <div className="font-display text-sm" style={{ color: res ? (res.result >= 0 ? C.lime : C.red) : C.faint }}>
                      {res ? (res.result >= 0 ? '+' : '') + res.result : '–'}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </Card>

        {editing.entryMode === 'holebyhole' && activePlayers.length > 0 && (
          <Card>
            <div className="font-display text-lg mb-2" style={{ color: C.text }}>
              Hole-by-hole
            </div>
            <div style={{ overflowX: 'auto' }}>
              <div style={{ display: 'grid', gridTemplateColumns: `110px repeat(${holes.length}, 42px)`, minWidth: 110 + holes.length * 42 }}>
                <div style={{ position: 'sticky', left: 0, background: C.surface }} className="text-[10px] uppercase py-1" >
                  <span style={{ color: C.muted }}>Hole</span>
                </div>
                {holes.map((h, i) => (
                  <div key={i} className="text-[11px] text-center py-1 font-display" style={{ color: C.text }}>
                    {i + 1}
                  </div>
                ))}
                <div style={{ position: 'sticky', left: 0, background: C.surface }} className="text-[10px] py-1">
                  <span style={{ color: C.muted }}>Par</span>
                </div>
                {holes.map((h, i) => (
                  <div key={i} className="text-[11px] text-center py-1" style={{ color: C.muted }}>
                    {h.par}
                  </div>
                ))}
                <div style={{ position: 'sticky', left: 0, background: C.surface }} className="text-[10px] py-1 mb-1">
                  <span style={{ color: C.muted }}>SI</span>
                </div>
                {holes.map((h, i) => (
                  <div key={i} className="text-[11px] text-center py-1 mb-1" style={{ color: C.faint, borderBottom: `1px solid ${C.border}` }}>
                    {h.si}
                  </div>
                ))}
                {activePlayers.map((p) => (
                  <React.Fragment key={p.id}>
                    <div style={{ position: 'sticky', left: 0, background: C.surface }} className="text-xs py-1.5 truncate pr-2" title={p.name}>
                      <span style={{ color: C.text }}>{p.name}</span>
                    </div>
                    {holes.map((h, i) => (
                      <div key={i} className="py-1 flex items-center justify-center">
                        <input
                          type="number"
                          value={editing.playerData[p.id]?.holeScores?.[i] ?? ''}
                          onChange={(e) => setHoleScore(editing.id, p.id, i, e.target.value === '' ? null : Number(e.target.value))}
                          className="w-9 h-8 text-center text-xs rounded-lg outline-none"
                          style={{ background: C.surface2, color: C.text, border: `1px solid ${C.border}` }}
                        />
                      </div>
                    ))}
                  </React.Fragment>
                ))}
              </div>
            </div>
          </Card>
        )}

        <PrimaryButton
          onClick={() => {
            patchRound(editing.id, { status: 'live', entryMode: 'holebyhole', currentHole: editing.currentHole || 0 });
          }}
          disabled={activePlayers.length === 0}
          style={{ width: '100%', textAlign: 'center', marginBottom: 8, paddingTop: 16, paddingBottom: 16, fontSize: 16 }}
        >
          {editing.status === 'final' || Object.keys(editing.playerData).length > 0 ? '▶ Resume live scoring' : '▶ Begin Round'}
        </PrimaryButton>
        {activePlayers.length === 0 && (
          <div className="text-xs text-center mb-2" style={{ color: C.muted }}>
            Select at least one player to begin
          </div>
        )}

        <GhostButton onClick={() => deleteRound(editing.id)} color={C.red} style={{ width: '100%', textAlign: 'center', marginBottom: 24 }}>
          Delete round
        </GhostButton>
      </div>
    );
  }

  return (
    <div>
      <PrimaryButton onClick={newRound} style={{ width: '100%', marginBottom: 16 }}>
        + New Round
      </PrimaryButton>
      {rounds.map((r) => {
        const course = courses.find((c) => c.id === r.courseId);
        const roundPlayers = roundPlayerList(r, players);
        const scored = course ? roundPlayers.filter((p) => playerPointsInRound(r, p, course) != null).length : 0;
        return (
          <button key={r.id} onClick={() => setEditingRoundId(r.id)} className="w-full text-left rounded-3xl p-4 mb-3" style={{ background: C.surface, border: `1px solid ${C.border}` }}>
            <div className="flex items-center justify-between">
              <div>
                <div className="font-display text-lg" style={{ color: C.text }}>
                  {r.date}
                </div>
                <div className="text-xs" style={{ color: C.muted }}>
                  {r.holes}-hole · {course ? course.name : 'Unknown course'}
                </div>
              </div>
              <div className="flex items-center gap-2 shrink-0">
                {r.status === 'live' && (
                  <span className="px-2 py-0.5 rounded-full text-[10px] font-bold" style={{ background: C.red, color: '#fff' }}>
                    ● LIVE
                  </span>
                )}
                <div className="text-xs font-display" style={{ color: C.gold }}>
                  {scored}/{roundPlayers.length} scored
                </div>
              </div>
            </div>
          </button>
        );
      })}
      {rounds.length === 0 && (
        <div className="text-sm text-center py-6" style={{ color: C.muted }}>
          No rounds yet — create one above.
        </div>
      )}
    </div>
  );
}

// ---------- Settings tab ----------
function SettingsTab({ settings, setSettings, players, setPlayers, courses, rounds, setRounds }) {
  const fileInputRef = useRef(null);
  function patch(p) {
    setSettings((s) => ({ ...s, ...p }));
  }
  function loadSample() {
    const newPlayers = SAMPLE_PLAYERS.map((p, i) => ({ id: uid(), name: p.name, ghin: p.ghin, handicap: p.handicap, team: i % 2 === 0 ? 'team1' : 'team2' }));
    setPlayers(newPlayers);
    const sampleRound = {
      id: uid(),
      date: '2026-06-16',
      courseId: DEFAULT_COURSE.id,
      teeName: 'Grey',
      holes: 18,
      entryMode: 'holebyhole',
      combinedWith: null,
      playerIds: newPlayers.map((p) => p.id),
      skinsOptIn: [],
      playerData: {},
    };
    setRounds([sampleRound]);
  }
  function exportBackup() {
    const data = { settings, players, courses, rounds };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${settings.leagueName.replace(/\s+/g, '-').toLowerCase()}-backup.json`;
    a.click();
    URL.revokeObjectURL(url);
  }
  function importBackup(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (data.settings) setSettings(data.settings);
        if (data.players) setPlayers(data.players);
        if (data.rounds) setRounds(data.rounds);
      } catch (err) {
        alert('Could not read that backup file.');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  }
  function eraseEverything() {
    if (!window.confirm('Erase all league data? This cannot be undone.')) return;
    setSettings(DEFAULT_SETTINGS);
    setPlayers([]);
    setRounds([]);
  }

  return (
    <div>
      <Card>
        <div className="font-display text-xl mb-3" style={{ color: C.text }}>
          League Settings
        </div>
        <div className="grid grid-cols-2 gap-2 mb-3">
          <TextField label="League name" value={settings.leagueName} onChange={(v) => patch({ leagueName: v })} />
          <div>
            <div className="text-[10px] uppercase tracking-wide mb-1" style={{ color: C.muted }}>
              Quota base (default 36)
            </div>
            <NumStepper value={settings.quotaBase} onChange={(v) => patch({ quotaBase: v })} min={0} max={72} />
          </div>
        </div>
        <div className="grid grid-cols-2 gap-2 mb-1">
          <TextField label="Team 1 name" value={settings.team1Name} onChange={(v) => patch({ team1Name: v })} />
          <TextField label="Team 2 name" value={settings.team2Name} onChange={(v) => patch({ team2Name: v })} />
        </div>
      </Card>

      <Card>
        <SectionLabel>Quota method</SectionLabel>
        <div className="text-[10px] uppercase tracking-wide mb-1" style={{ color: C.muted }}>
          Rolling average window (0 = static {settings.quotaBase}−HC)
        </div>
        <NumStepper value={settings.rollingWindow} onChange={(v) => patch({ rollingWindow: v })} min={0} max={20} />
        <InfoNote>
          Set to e.g. 5 to make each quota the average of a player's last 5 point totals once that many rounds exist (classic self-adjusting dogfight). Leave 0 to keep {settings.quotaBase}−handicap.
        </InfoNote>
      </Card>

      <Card>
        <SectionLabel>Weekly purse</SectionLabel>
        <div className="grid grid-cols-2 gap-2">
          <div>
            <div className="text-[10px] uppercase tracking-wide mb-1" style={{ color: C.muted }}>
              Buy-in per player ($)
            </div>
            <NumStepper value={settings.purseBuyIn} onChange={(v) => patch({ purseBuyIn: v })} min={0} max={500} />
          </div>
          <SelectField
            label="Payout"
            value={settings.purseSplits.join(',')}
            onChange={(v) => patch({ purseSplits: v.split(',').map(Number) })}
            options={[
              { value: '100', label: 'Winner takes all' },
              { value: '60,40', label: 'Top 2 split 60/40' },
              { value: '50,30,20', label: 'Top 3 split 50/30/20' },
              { value: '40,30,20,10', label: 'Top 4 split 40/30/20/10' },
            ]}
          />
        </div>
      </Card>

      <Card>
        <SectionLabel>Season prize pool</SectionLabel>
        <div className="grid grid-cols-2 gap-2">
          <div>
            <div className="text-[10px] uppercase tracking-wide mb-1" style={{ color: C.muted }}>
              Season buy-in per player ($)
            </div>
            <NumStepper value={settings.seasonBuyIn} onChange={(v) => patch({ seasonBuyIn: v })} min={0} max={2000} step={10} />
          </div>
          <div>
            <div className="text-[10px] uppercase tracking-wide mb-1" style={{ color: C.muted }}>
              Rake to season pool per round ($)
            </div>
            <NumStepper value={settings.seasonRakePerRound} onChange={(v) => patch({ seasonRakePerRound: v })} min={0} max={500} step={5} />
          </div>
        </div>
      </Card>

      <Card>
        <SectionLabel>Season rules</SectionLabel>
        <div className="grid grid-cols-2 gap-2">
          <TextField label="Season start date" type="date" value={settings.seasonStart} onChange={(v) => patch({ seasonStart: v })} />
          <div>
            <div className="text-[10px] uppercase tracking-wide mb-1" style={{ color: C.muted }}>
              Minimum matches per player
            </div>
            <NumStepper value={settings.minMatches} onChange={(v) => patch({ minMatches: v })} min={1} max={50} />
          </div>
        </div>
        <div className="mt-2">
          <div className="text-[10px] uppercase tracking-wide mb-1" style={{ color: C.muted }}>
            Top scores counted
          </div>
          <NumStepper value={settings.topScoresCounted} onChange={(v) => patch({ topScoresCounted: v })} min={1} max={50} />
        </div>
      </Card>

      <Card>
        <SectionLabel>Skins</SectionLabel>
        <div className="grid grid-cols-2 gap-2">
          <div>
            <div className="text-[10px] uppercase tracking-wide mb-1" style={{ color: C.muted }}>
              Skins buy-in per player ($, 0 = off)
            </div>
            <NumStepper value={settings.skinsBuyIn} onChange={(v) => patch({ skinsBuyIn: v })} min={0} max={100} />
          </div>
          <SelectField
            label="Type"
            value={settings.skinsType}
            onChange={(v) => patch({ skinsType: v })}
            options={[{ value: 'gross', label: 'Gross' }, { value: 'net', label: 'Net' }]}
          />
        </div>
      </Card>

      <Card>
        <SectionLabel>Season points by finish</SectionLabel>
        <p className="text-xs mb-2" style={{ color: C.muted }}>
          Points for 1st, 2nd, 3rd… (comma separated; places beyond the list get the last value)
        </p>
        <TextField value={settings.seasonPointsByFinish.join(', ')} onChange={(v) => patch({ seasonPointsByFinish: v.split(',').map((x) => Number(x.trim())).filter((x) => !isNaN(x)) })} />
      </Card>

      <Card>
        <SectionLabel>Data</SectionLabel>
        <div className="grid grid-cols-2 gap-2 mb-2">
          <GhostButton onClick={loadSample}>Load sample data</GhostButton>
          <GhostButton onClick={exportBackup}>Export backup (.json)</GhostButton>
        </div>
        <div className="grid grid-cols-2 gap-2">
          <GhostButton onClick={() => fileInputRef.current?.click()}>Import backup</GhostButton>
          <GhostButton onClick={eraseEverything} color={C.red}>
            Erase everything
          </GhostButton>
        </div>
        <input ref={fileInputRef} type="file" accept="application/json" onChange={importBackup} style={{ display: 'none' }} />
        <InfoNote>All data is saved in this browser only. Use Export to keep a backup or move it to another device. Bookmark this page to find it again.</InfoNote>
      </Card>
    </div>
  );
}

// ---------- How It Works tab ----------
function HowItWorksTab({ settings }) {
  return (
    <div>
      <Card>
        <div className="font-display text-2xl mb-2" style={{ color: C.text }}>
          How a Dogfight Works
        </div>
        <p className="text-sm leading-relaxed" style={{ color: C.muted }}>
          A dogfight is a quota-based points game that lets golfers of very different skill levels compete head to head and fairly. Instead of lowest score wins, every player has a personal quota — a target number of points — and you compete on how far you beat your own quota.
        </p>
      </Card>

      <Card>
        <div className="font-display text-lg mb-2" style={{ color: C.lime }}>
          1. Points (Stableford)
        </div>
        <p className="text-sm mb-2" style={{ color: C.muted }}>
          You earn points on each hole based on your score. The standard scale relative to par:
        </p>
        <ul className="text-sm space-y-1" style={{ color: C.text }}>
          <li>Double bogey or worse = <b>0</b></li>
          <li>Bogey = <b>1</b></li>
          <li>Par = <b>2</b></li>
          <li>Birdie = <b>3</b></li>
          <li>Eagle = <b>4</b>, Albatross = <b>5</b></li>
        </ul>
        <p className="text-xs mt-2" style={{ color: C.faint }}>
          Add them up for your round total. In Hole-by-hole entry the app totals these for you automatically.
        </p>
      </Card>

      <Card>
        <div className="font-display text-lg mb-2" style={{ color: C.lime }}>
          2. Quota
        </div>
        <p className="text-sm" style={{ color: C.muted }}>
          This league sets Quota = {settings.quotaBase} − handicap. A 14-handicap has a quota of {settings.quotaBase - 14}; a 4-handicap has a quota of {settings.quotaBase - 4}. The lower the handicap, the higher the bar.
        </p>
      </Card>

      <Card>
        <div className="font-display text-lg mb-2" style={{ color: C.lime }}>
          3. The result (+/-)
        </div>
        <p className="text-sm" style={{ color: C.muted }}>
          Your round score is points − quota. Beat your quota by the most and you win the round. Whoever has the highest +/- wins.
        </p>
      </Card>

      <Card>
        <div className="font-display text-lg mb-2" style={{ color: C.lime }}>
          4. The money (three games at once)
        </div>
        <ul className="text-sm space-y-2" style={{ color: C.muted }}>
          <li>
            <b style={{ color: C.text }}>Weekly purse:</b> everyone in the round buys in (currently ${settings.purseBuyIn}). ${settings.seasonRakePerRound} is pulled into the season prize pool; the rest pays out by finish vs. quota.
          </li>
          <li>
            <b style={{ color: C.text }}>Skins:</b> a separate opt-in game (currently ${settings.skinsBuyIn} buy-in). Only players who opt in that round pay in and can win.
          </li>
          <li>
            <b style={{ color: C.text }}>Season points:</b> each round awards points by finish position. Your best {settings.topScoresCounted} rounds count toward the season title.
          </li>
          <li>
            <b style={{ color: C.text }}>Team battle:</b> every player is on {settings.team1Name} or {settings.team2Name}. The same season points sum by team.
          </li>
        </ul>
      </Card>

      <Card>
        <div className="font-display text-lg mb-2" style={{ color: C.lime }}>
          5. Running a round day-of
        </div>
        <ul className="text-sm space-y-2" style={{ color: C.muted }}>
          <li>Collect buy-ins. Confirm everyone's quota (auto-shown on the Players tab).</li>
          <li>Play. Track points; if you want skins, keep each player's hole-by-hole gross.</li>
          <li>
            After the round, open <b style={{ color: C.text }}>Rounds & Scores</b>, create the round, and enter points (and hole scores for skins).
          </li>
          <li>The app ranks everyone, splits the purse and skins, and updates the season standings automatically.</li>
        </ul>
      </Card>

      <Card>
        <div className="font-display text-lg mb-2" style={{ color: C.lime }}>
          Playing 9 holes & combining nines
        </div>
        <p className="text-sm" style={{ color: C.muted }}>
          Set any round to 9 holes and quotas automatically halve. If you play two nines you want scored as one 18, open one and choose the other under <b style={{ color: C.text }}>Combine with</b> — the app sums both nines into a combined 18 that counts as a single event in the season standings. Each nine still settles its own purse and skins.
        </p>
      </Card>
    </div>
  );
}

// ---------- main app ----------
function DogfightLeague() {
  const [loading, setLoading] = useState(true);
  const [activeTab, setActiveTab] = useState('standings');
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [players, setPlayers] = useState(makeDefaultPlayers);
  const [courses] = useState([DEFAULT_COURSE]);
  const [rounds, setRounds] = useState([]);
  const [editingRoundId, setEditingRoundId] = useState(null);
  const saveTimer = useRef(null);

  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get(STORAGE_KEY);
        if (res && res.value) {
          const data = JSON.parse(res.value);
          if (data.settings) setSettings({ ...DEFAULT_SETTINGS, ...data.settings });
          if (data.players) setPlayers(data.players);
          if (data.rounds) setRounds(data.rounds);
        }
      } catch (e) {}
      setLoading(false);
    })();
  }, []);

  useEffect(() => {
    if (loading) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      try {
        await window.storage.set(STORAGE_KEY, JSON.stringify({ settings, players, rounds }));
      } catch (e) {}
    }, 500);
    return () => clearTimeout(saveTimer.current);
  }, [settings, players, rounds, loading]);

  if (loading) {
    return (
      <div className="min-h-screen flex items-center justify-center" style={{ background: C.black }}>
        <style>{`@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap'); .font-display{font-family:'Space Grotesk',sans-serif;}`}</style>
        <div className="font-display text-xl" style={{ color: C.lime, textShadow: '0 0 14px rgba(180,255,57,0.5)' }}>
          LOADING…
        </div>
      </div>
    );
  }

  return (
    <div style={{ maxWidth: 480, margin: '0 auto', minHeight: '100vh', background: C.black }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');
        .font-display { font-family: 'Space Grotesk', sans-serif; letter-spacing: 0.01em; }
        body, .app-root { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        input::placeholder { color: ${C.faint}; }
        select { color-scheme: dark; }
      `}</style>
      <div className="app-root min-h-screen">
        <div className="flex items-center gap-3 px-4 pt-6 pb-4">
          <div className="text-3xl">🏌️</div>
          <div>
            <div className="font-display text-2xl leading-none" style={{ color: C.text }}>
              {settings.leagueName}
            </div>
            <div className="text-xs mt-1" style={{ color: C.muted }}>
              Quota points · Weekly purse · Skins · Season standings
            </div>
          </div>
        </div>

        <div className="flex gap-5 overflow-x-auto px-4 pb-2 scrollbar-hide sticky top-0 z-10" style={{ background: C.black, borderBottom: `1px solid ${C.border}` }}>
          {TABS.map((t) => (
            <button
              key={t.id}
              onClick={() => {
                setActiveTab(t.id);
                if (t.id !== 'rounds') setEditingRoundId(null);
              }}
              className="shrink-0 pb-2 text-sm font-semibold whitespace-nowrap"
              style={{ color: activeTab === t.id ? C.text : C.muted, borderBottom: activeTab === t.id ? `2px solid ${C.lime}` : '2px solid transparent' }}
            >
              {t.label}
            </button>
          ))}
        </div>

        <div className="px-4 pt-4 pb-10">
          {activeTab === 'standings' && <StandingsTab settings={settings} players={players} rounds={rounds} courses={courses} onGoPlayers={() => setActiveTab('players')} />}
          {activeTab === 'rounds' && (
            <RoundsTab settings={settings} players={players} courses={courses} rounds={rounds} setRounds={setRounds} editingRoundId={editingRoundId} setEditingRoundId={setEditingRoundId} />
          )}
          {activeTab === 'skins' && <SkinsTab settings={settings} players={players} rounds={rounds} courses={courses} />}
          {activeTab === 'players' && <PlayersTab settings={settings} players={players} setPlayers={setPlayers} />}
          {activeTab === 'settings' && <SettingsTab settings={settings} setSettings={setSettings} players={players} setPlayers={setPlayers} courses={courses} rounds={rounds} setRounds={setRounds} />}
          {activeTab === 'howitworks' && <HowItWorksTab settings={settings} />}
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<DogfightLeague />);
</script>
</body>
</html>
